  'Fault Tolerance': {
    explain: '<strong>Fault tolerance</strong> = the system keeps working even when parts of it break. If one server crashes, do all users get errors? Or does traffic automatically route to healthy servers? True fault tolerance means users never notice a failure because the system silently recovers.',
    analogy: '✈️ Planes have 4 engines but can fly on 2. They don\'t land if one engine fails — they keep going. Your system should work the same way: lose a database replica? Still running. Lose an entire data center? Still running.'
  },
  'Scalability': {
    explain: '<strong>Scalability</strong> = can your system handle 10x more users without completely redesigning it? A scalable system grows gracefully — add more servers, traffic handled. A non-scalable system hits a wall and collapses under load.',
    analogy: '🏪 A corner store can\'t handle 10,000 customers. Walmart can. The difference isn\'t the products — it\'s the architecture: multiple checkout lanes, distribution centers, inventory systems. Scalability is architecture, not just hardware.'
  },
  'Stateless vs Stateful': {
    explain: '<strong>Stateless</strong> = the server remembers nothing between requests. Every request carries everything the server needs. <strong>Stateful</strong> = the server remembers your session. Stateless is easier to scale (any server handles any request) but requires the client or a shared store to carry state.',
    analogy: '🍔 A fast food cashier (stateless) treats every customer identically — you tell them your order fresh each time. A personal waiter at a restaurant (stateful) remembers you like no onions and already knows your usual drink. The fast food model scales to millions; the personal waiter doesn\'t.'
  },
  // Scaling
  'Vertical Scaling': {
    explain: '<strong>Vertical scaling</strong> (scale up) = make your single machine more powerful. Add more RAM, faster CPU, bigger disk. Simple — no code changes needed. But there\'s a ceiling: the most powerful single server on Earth still can\'t handle Google-scale traffic, and if it crashes, everything goes down.',
    analogy: '🏋️ Lifting heavier weights makes you stronger — up to a point. You can\'t just keep adding weight forever. Eventually you need a whole team of people carrying it together.'
  },
  'Horizontal Scaling': {
    explain: '<strong>Horizontal scaling</strong> (scale out) = add more machines instead of making one machine bigger. 1 server → 10 servers → 1000 servers. Each handles a fraction of the load. This is how Google, Netflix, Amazon scale — not by having one super-computer, but millions of average ones.',
    analogy: '🍕 One pizza oven can make 10 pizzas/hour. Adding a second identical oven doubles capacity. Adding a tenth gives you 100 pizzas/hour. You don\'t need to build a magical giant oven — just add normal ovens.'
  },
  'Auto Scaling': {
    explain: '<strong>Auto scaling</strong> = your system automatically adds or removes servers based on traffic. Traffic spikes at 9am? New servers spin up. Traffic drops at 3am? Servers shut down. You only pay for what you use, and you never run out of capacity.',
    analogy: '🚕 Uber surge pricing triggers more drivers to come online when demand is high. When demand drops, drivers go home. Auto scaling is the same concept: the "fleet" grows and shrinks automatically based on demand.'
  },
  'Stateless Architecture': {
    explain: 'When every server in your fleet is stateless, a load balancer can send any request to any server — because they all behave identically. No sticky sessions, no data stranded on one machine. State lives in Redis or a database, not in server memory.',
    analogy: '🏦 An ATM is stateless — any ATM can serve any customer because your account data lives in the bank\'s central database, not inside the ATM machine itself.'
  },
  'Microservices vs Monolith': {
    explain: '<strong>Monolith</strong> = everything in one big codebase. Simple to start, hard to scale independently. <strong>Microservices</strong> = split into small services (Auth, Payments, Notifications...), each deployable independently. Microservices let different teams work in parallel and scale individual features — but add huge operational complexity.',
    analogy: '🏠 A monolith is like a house where the kitchen, bedroom, and bathroom share the same walls — cozy and simple, but renovating the kitchen might crack the bathroom. Microservices are like separate modular units — each can be rebuilt independently without touching the others.'
  },
  // Load Balancing
  'L4 vs L7': {
    explain: '<strong>Layer 4 (L4)</strong> load balancing = distributes traffic based on IP address and TCP port only. Fast but dumb — it doesn\'t look inside the request. <strong>Layer 7 (L7)</strong> = reads the actual HTTP request — can route based on URL path, headers, cookies. Slower but smarter: <code>/api</code> goes to API servers, <code>/static</code> goes to CDN.',
    analogy: '📬 L4 = a mail sorter who routes packages by zip code only (fast). L7 = a sorter who opens the box and reads the label to send to the exact department (smarter but slower).'
  },
  'Round Robin': {
    explain: '<strong>Round robin</strong> = send request 1 to server A, request 2 to server B, request 3 to server C, request 4 back to server A... Simple, fair, and works great when all servers have equal capacity. Fails when servers have different power — a weak server gets the same load as a strong one.',
    analogy: '👨‍🏫 A teacher calling on students one by one, going around the room in order. Fair, predictable, but doesn\'t account for the fact that some students answer faster than others.'
  },
  'Least Connections': {
    explain: '<strong>Least connections</strong> = send the next request to whichever server currently has the fewest active connections. Smarter than round robin — a slow server accumulates requests and gets fewer new ones automatically. Works great when requests have variable processing times.',
    analogy: '🏪 At a grocery store, you look at which checkout lane has the shortest line and join that one — not blindly joining the "next" lane in rotation.'
  },
  'Consistent Hashing': {
    explain: '<strong>Consistent hashing</strong> solves a painful problem: if you use <code>server = hash(key) % N</code> and add one server, almost every key maps to a different server — your entire cache is instantly invalidated. Consistent hashing uses a ring so adding one server only remaps <code>1/N</code> of keys.',
    analogy: '🍕 Imagine your cache as a pizza cut into 8 slices. Regular hashing: add a 9th slice and the whole pizza gets recut — every slice changes. Consistent hashing: add a new slice by splitting just one existing slice. Only that slice\'s customers are affected.'
  },
  'Sticky Sessions': {
    explain: '<strong>Sticky sessions</strong> = a user\'s requests always go to the same server. Required when session data lives in server memory. Problem: that server becomes a bottleneck and SPOF. If it crashes, the user\'s session is gone. Better solution: store sessions in Redis so any server can handle any user.',
    analogy: '🎰 Imagine a casino that always makes you play at the same table because your chips are there. If that dealer goes on break, you\'re stuck waiting. Better design: chips are digital, tracked centrally — sit at any table.'
  },
  'Health Checks': {
    explain: '<strong>Health checks</strong> = the load balancer regularly pings each server: "are you alive?" If a server fails to respond 3 times in a row, it\'s removed from the pool. When it recovers and passes 2 consecutive checks, it\'s added back. This ensures traffic never goes to dead servers.',
    analogy: '🩺 A doctor checking a patient\'s pulse every few seconds. If the pulse is gone for too long, you take action. If it comes back, you note recovery. The load balancer does this automatically for every server in its fleet.'
  },
  // Caching
  'Cache-aside': {
    explain: 'The most common pattern. <strong>App checks cache first</strong>. Hit → return value. Miss → fetch from DB, write to cache, return value. The app manages the cache explicitly. Cache only contains what was actually requested (lazy population). Simple but means first request for any key is always slow.',
    analogy: '📚 You check your personal notes first. If the answer isn\'t there, you look it up in the textbook, then write it in your notes for next time. Your notes grow organically based on what you actually look up.'
  },
  'Write-through': {
    explain: 'Every write goes to <strong>both cache and database simultaneously</strong>. Cache is always consistent with the DB. Reads are fast (always cache hit for written data). But writes are slower — you pay the DB write cost every time. Good for read-heavy data that must be consistent.',
    analogy: '✏️ When a teacher grades your paper, they write the score in both your notebook and the school gradebook at the same time. Always consistent, but every grading takes twice as long.'
  },
  'Write-back': {
    explain: 'Write to <strong>cache only</strong>, acknowledge to client immediately. Asynchronously flush to DB later. Fastest writes possible. Risk: if cache crashes before flushing, you lose data. Used where write speed matters more than durability (gaming leaderboards, analytics counters).',
    analogy: '📝 You draft an email, it saves locally instantly. It syncs to the server a few seconds later. If your laptop dies before sync — the email is gone. Fast, but risky.'
  },
  'Write-around': {
    explain: 'Writes go <strong>directly to the database, bypassing cache</strong>. Cache is only populated on reads. Prevents cache from being polluted with write-once data that might never be read again. Good for bulk imports or data that\'s rarely re-read after write.',
    analogy: '🗄️ Filing documents directly in a storage room without making a photocopy first. The copy only gets made if someone actually asks to see the document later.'
  },
  'TTL': {
    explain: '<strong>Time-To-Live</strong> = every cached value has an expiry time. After TTL, the key is deleted and the next request fetches fresh data from DB. Short TTL = fresh data, more DB hits. Long TTL = stale data, fewer DB hits. Choosing TTL is a trade-off between freshness and DB load.',
    analogy: '🥛 Milk has an expiry date. You can use it until it expires — fast and convenient. After expiry, you must get fresh milk from the store (database). Set the expiry too short and you\'re running to the store constantly.'
  },
  'LRU/LFU': {
    explain: '<strong>LRU (Least Recently Used)</strong> = when cache is full, evict the item that was accessed longest ago. Assumes recent = relevant. <strong>LFU (Least Frequently Used)</strong> = evict the item accessed fewest times total. Assumes popular = relevant. LRU is simpler and better for most use cases; LFU handles viral content better.',
    analogy: '📖 LRU = clear out books you haven\'t opened in the longest time. LFU = clear out the book you\'ve opened the fewest times total. If you opened a book once last week vs a book 100 times last year, LRU keeps the recent one, LFU keeps the popular one.'
  },
  'Redis': {
    explain: '<strong>Redis</strong> = in-memory key-value store. Sub-millisecond reads. Supports strings, lists, sets, sorted sets, hashes, pub/sub. Used for: caching, sessions, rate limiting, leaderboards, pub/sub messaging. 100,000 ops/sec on a single node. Data can optionally persist to disk.',
    analogy: '⚡ Redis is like your desk. Your filing cabinet (database) has everything, but it\'s slow to walk there. Your desk has the 20 things you\'re actively working on — instant access. Redis is the desk of your system.'
  },
  'Memcached': {
    explain: '<strong>Memcached</strong> = simple, fast, in-memory cache. Only supports key-value strings (no complex data types). Multi-threaded (better CPU utilization than Redis on multi-core). No persistence. Simpler than Redis — use it when you just need "remember this value for X minutes" without complex data structures.',
    analogy: '📌 A sticky note on your monitor. Just a key and a value. Nothing fancy — but extremely fast to read. Redis is a full-featured notebook; Memcached is a sticky note.'
  },
  'CDN': {
    explain: '<strong>Content Delivery Network</strong> = a global network of edge servers that cache your static content (images, videos, CSS, JS) close to users. Instead of fetching a video from a server in Virginia, a user in Delhi gets it from a nearby CDN node in Mumbai. Dramatically reduces latency and server load.',
    analogy: '📦 Amazon has warehouses in every city — when you order, it ships from the nearest one. Without CDN, every user downloads from one central server. With CDN, content is pre-stocked near every user globally.'
  },
  // Databases
  'SQL vs NoSQL': {
    explain: '<strong>SQL</strong> = structured, fixed schema, supports joins and ACID transactions. Great for complex queries and relationships. <strong>NoSQL</strong> = flexible schema, designed for massive scale, simpler access patterns. Key-value, document, column, or graph stores. Choose based on data shape and access patterns — not popularity.',
    analogy: '📊 SQL is a spreadsheet with strict column headers — every row must fit the structure. NoSQL is a collection of JSON files — each can have different fields. The spreadsheet is easier to query across rows; the JSON files are easier to change and scale.'
  },
  'ACID': {
    explain: '<strong>Atomicity</strong> = all steps of a transaction succeed or none do. <strong>Consistency</strong> = DB stays in a valid state. <strong>Isolation</strong> = concurrent transactions don\'t interfere. <strong>Durability</strong> = committed data survives crashes. This is why banks use PostgreSQL — you never want a payment to be half-processed.',
    analogy: '💸 You transfer ₹1000 to a friend. ACID ensures: money leaves your account AND arrives in theirs — or neither happens. Without it, money could vanish in transit if the server crashes mid-transaction.'
  },
  'CAP Theorem': {
    explain: 'A distributed database can only guarantee 2 of 3: <strong>C</strong>onsistency (every read returns the latest write), <strong>A</strong>vailability (every request gets a response), <strong>P</strong>artition tolerance (works even if network splits). Since partitions happen in real networks, the real choice is: CP (refuse requests when split) vs AP (serve possibly stale data when split).',
    analogy: '🔺 Like a triangle where you can only have two sides be strong. Cassandra is AP — it keeps serving during network splits but might show stale data. ZooKeeper is CP — it stops serving during splits rather than risk inconsistency. You pick based on whether showing wrong data or refusing service is worse.'
  },
  'Sharding': {
    explain: '<strong>Sharding</strong> = split your database horizontally across multiple machines. User IDs 1-1M go to shard 1, 1M-2M to shard 2, etc. Each shard is a separate database with its own storage and compute. You do this when a single DB can\'t handle the data size or write throughput.',
    analogy: '📁 Instead of one massive filing cabinet with every document, split into 26 cabinets — A through Z. Each cabinet handles a fraction of the total. Querying by name? Go straight to the right cabinet. Need everything at once? You have to check all 26.'
  },
  'Replication': {
    explain: '<strong>Replication</strong> = keep identical copies of your database on multiple machines. One primary receives writes and replicates to replicas. If the primary dies, a replica is promoted. Also spreads read load across replicas. The tradeoff: lag between write and replica sync means replicas might be slightly behind.',
    analogy: '📷 Replication is like keeping backup copies of important photos. The original (primary) is where new photos are added. The copies (replicas) are kept in sync. If the original is lost, a copy takes over immediately.'
  },
  'Read Replicas': {
    explain: '<strong>Read replicas</strong> = extra copies of your database dedicated to serving read queries, offloading them from the primary. Most apps are 80-90% reads — replicas absorb that traffic. Writes still go to the primary. Replicas may lag slightly (eventual consistency).',
    analogy: '📖 A library makes photocopies of a popular book and puts them on multiple shelves. Anyone who wants to read grabs a copy — they don\'t all queue for the original. New chapters are only added to the original and then copied to all shelves.'
  },
  'Indexing': {
    explain: '<strong>Indexes</strong> = a sorted data structure (usually a B-tree) that lets the DB find rows without scanning the entire table. A query on an unindexed column scans every row — O(n). With an index on that column, it\'s O(log n). Indexes speed reads massively but slow writes (index must be updated on every insert/update).',
    analogy: '📚 A book\'s index in the back lets you jump to "Redis" on page 247 instantly. Without the index, you\'d read every page. The trade-off: someone had to create and maintain that index as the book was written.'
  },
  'Eventual Consistency': {
    explain: '<strong>Eventual consistency</strong> = after a write, all replicas will eventually have the same data — but not necessarily immediately. For a brief window, different users might see different values. This is acceptable for most social media (a few milliseconds lag on a like count is fine) but not for banking.',
    analogy: '🌍 When breaking news happens, different TV channels report it at slightly different times — but eventually they all have the same story. Your bank balance, however, must be the same everywhere instantly — no eventual consistency there.'
  },
  // Networking
  'DNS': {
    explain: '<strong>DNS (Domain Name System)</strong> = the phone book of the internet. Translates "google.com" into an IP address (142.250.x.x) that routers understand. Multiple layers of caching (browser → OS → ISP → root DNS) mean most lookups are fast. DNS TTL determines how long the cached answer lives.',
    analogy: '📞 You know your friend as "Priya" — but to call her, you need her phone number. DNS is the contact list: you type "google.com" (the name), DNS gives back "142.250.80.46" (the phone number your browser can actually dial).'
  },
  'TCP vs UDP': {
    explain: '<strong>TCP</strong> = reliable, ordered, connection-based. Guarantees every packet arrives and in order. Slower (handshake, acknowledgements). Use for: HTTP, email, file transfers. <strong>UDP</strong> = fire-and-forget. No guarantees, no ordering. Faster. Use for: video streaming, gaming, DNS — where speed matters more than perfection.',
    analogy: '📬 TCP = certified mail — you get a receipt confirming delivery, and packages arrive in order. UDP = dropping postcards in a mailbox — fast, no receipt, might arrive out of order or not at all. For a live video call, a dropped frame is fine. For a bank transfer, every byte must arrive.'
  },
  'HTTP/HTTPS': {
    explain: '<strong>HTTP</strong> = the language browsers and servers use to communicate. Request/response protocol. <strong>HTTPS</strong> = HTTP with TLS encryption — all data between browser and server is encrypted so nobody in between can read it. In 2024, everything should be HTTPS.',
    analogy: '📮 HTTP = sending a postcard — anyone handling it can read the message. HTTPS = sending a sealed letter in a tamper-evident envelope — only the recipient can read it, and they can verify it wasn\'t opened.'
  },
  'TLS Handshake': {
    explain: 'Before any encrypted data flows, browser and server perform a <strong>TLS handshake</strong>: exchange certificates to verify identity, negotiate encryption algorithms, and create a shared secret key. All subsequent communication is encrypted with that key. Adds ~1 round-trip latency but happens once per connection.',
    analogy: '🤝 Two spies meet and agree on a secret code before exchanging information. The handshake = establishing the secret code. Everything after = speaking in that code so nobody listening in can understand.'
  },
  'Reverse Proxy': {
    explain: 'A <strong>reverse proxy</strong> sits in front of your servers and intercepts all incoming requests. It can load balance, cache responses, terminate SSL, compress content, and protect backend servers (clients never know backend IPs). Nginx is the most common reverse proxy.',
    analogy: '🏢 The reception desk of a building. Every visitor checks in at reception — they never go directly to individual offices. Reception routes them to the right person, keeps a log, and can block unwanted visitors.'
  },
  'API Gateway': {
    explain: 'An <strong>API Gateway</strong> is a specialized reverse proxy for microservices. Single entry point for all API calls. Handles: authentication, rate limiting, request routing to the right microservice, response aggregation, SSL termination, and logging. Clients call one URL; the gateway handles the complexity behind.',
    analogy: '✈️ An airport check-in desk. You hand over your passport once — they verify identity, check your booking, assign your gate, and send you through. You don\'t separately knock on the door of every airline, security, and gate agent.'
  },
  // Security
  'Authentication': {
    explain: '<strong>Authentication</strong> = proving who you are. "I am Nikhil" — the system verifies this claim. Methods: password + username, OAuth tokens, biometrics. Failed authentication = system rejects you. This is step 1 before any authorization happens.',
    analogy: '🪪 Showing your ID at the entrance. The bouncer checks: is this a real ID? Does the photo match your face? That\'s authentication. What rooms you\'re allowed in is authorization — separate question.'
  },
  'Authorization': {
    explain: '<strong>Authorization</strong> = what are you allowed to do? Even after you\'re authenticated (proven who you are), authorization checks your permissions. An intern at Google is authenticated but not authorized to deploy to production. Role-based access control (RBAC) is the standard system.',
    analogy: '🔑 A hotel key card gets you into the hotel (authentication). But it only opens your specific room, not room 301 or the executive lounge (authorization). Same person, different levels of access.'
  },
  'JWT': {
    explain: '<strong>JSON Web Token</strong> = a compact, signed token that contains claims about a user (user ID, roles, expiry). Server signs it with a secret key. Client stores it and sends it with every request. Server validates the signature — no DB lookup needed! Stateless authentication at scale.',
    analogy: '🎫 A concert wristband. The venue stamps it once (signs it). Security staff at each door check the stamp is genuine — they don\'t call the ticketing office each time. If the stamp looks right, you get in.'
  },
  'OAuth': {
    explain: '<strong>OAuth 2.0</strong> = a protocol for delegated authorization. "Sign in with Google" uses OAuth. You give Google permission to share limited info (name, email) with an app — without giving the app your Google password. The app gets an access token valid for specific scopes.',
    analogy: '🚗 Giving a valet your car key. A valet key only starts the car and opens the door — it doesn\'t open the glove compartment or the trunk. You give limited, scoped access. If the valet misbehaves, you revoke just that key.'
  },
  'Rate Limiting': {
    explain: '<strong>Rate limiting</strong> = cap how many requests a client can make in a time window. "100 requests per minute per user." Prevents DDoS attacks, API abuse, and ensures fair resource sharing. Common algorithms: token bucket (smooth), sliding window (precise), fixed window (simple).',
    analogy: '🚰 A water tap with a flow regulator. No matter how hard you turn it, only so much water flows per minute. This prevents one person from draining the entire water supply, leaving nothing for others.'
  },
  'HTTPS': {
    explain: 'Same as HTTP but with TLS encryption. All data is encrypted between browser and server. Certificates from Certificate Authorities (CAs) verify server identity. Without HTTPS, anyone on the same network (coffee shop WiFi) can read your traffic.',
    analogy: '🔐 Putting your message in a locked box before handing it to the postal service. Even if the postal worker reads it, they only see the locked box. Only the recipient has the key.'
  },
  // Reliability
  'SLO/SLA': {
    explain: '<strong>SLO (Service Level Objective)</strong> = an internal target you commit your team to: "p99 latency under 200ms." <strong>SLA (Service Level Agreement)</strong> = a contract with your customer with financial penalties if you miss it. SLO is what you aim for. SLA is what you get penalized for missing.',
    analogy: '🎯 SLO = your personal goal of getting to work by 9am. SLA = the contract with your boss: if you\'re late more than twice a month, you lose your bonus. One is self-imposed; the other has consequences.'
  },
  'Circuit Breaker': {
    explain: 'When a downstream service starts failing, a <strong>circuit breaker</strong> stops sending requests to it. Instead of waiting for timeouts on every request (slow fail), the circuit "trips" and requests fail fast immediately. After a recovery period, it lets a few test requests through. Prevents cascade failures.',
    analogy: '⚡ Electrical circuit breaker in your home. Instead of letting a short circuit burn your whole house down, the breaker trips — cutting power to that circuit only. When the fault is fixed, you reset the breaker.'
  },
  'Bulkhead': {
    explain: '<strong>Bulkhead pattern</strong> = isolate failures so they don\'t cascade. Give each service its own thread pool or connection pool. If the Payment service is slow and exhausts its thread pool, the User service still has its own pool and keeps working. Named after watertight compartments in ships.',
    analogy: '🚢 A ship divided into watertight compartments. If one compartment floods, the others stay dry — the ship doesn\'t sink. Without bulkheads, one hole floods the whole ship. Titanic had too few.'
  },
  'Retry Logic': {
    explain: '<strong>Retry with exponential backoff and jitter</strong> = if a request fails, wait a bit and try again. But don\'t retry immediately (thundering herd). Wait 1s, then 2s, then 4s, then 8s (exponential). Add random jitter so not all clients retry at the same millisecond.',
    analogy: '📞 Calling a friend whose line is busy. If you redial instantly over and over, you\'re making it worse. Better: wait a bit, try again. If still busy, wait longer. Jitter = different people waiting different amounts so they don\'t all call back at the same second.'
  },
  'Graceful Degradation': {
    explain: '<strong>Graceful degradation</strong> = when a component fails, the system keeps working in a reduced capacity instead of completely breaking. Netflix can\'t load recommendations? Show popular titles instead. Search is down? Show the homepage. Users experience reduced functionality, not zero functionality.',
    analogy: '🚘 A car losing one headlight — you can still drive, just more carefully and at reduced speed. Compare to total engine failure. Graceful degradation = keep going at reduced capacity vs complete stop.'
  },
  'Heartbeat': {
    explain: 'A <strong>heartbeat</strong> is a regular "I\'m alive" signal a server sends to a coordinator or its peers. If heartbeats stop arriving within a timeout window, the coordinator marks the server as dead and triggers failover. Used in distributed databases, leader election, and cluster management.',
    analogy: '❤️ A doctor monitoring a patient\'s heartbeat. As long as the beep comes regularly, everything is fine. If the beep stops for too long, alarms trigger and the crash team responds. Servers do the same for each other.'
  },
  // Distributed Systems
  'Consensus': {
    explain: '<strong>Consensus</strong> = getting multiple servers to agree on a single value, even when some might fail or be slow. The hard problem: you can\'t just ask "everyone vote yes/no" — what if messages get lost or servers crash mid-vote? Algorithms like <strong>Raft</strong> and <strong>Paxos</strong> solve this formally.',
    analogy: '🗳️ A committee deciding on a budget where some members might not show up or might lose their ballot. Consensus algorithms ensure the group reaches a valid decision even with partial participation and message loss.'
  },
  'Leader Election': {
    explain: 'In a distributed system, one node is often the <strong>leader</strong> — the one that coordinates writes, makes decisions, or holds the lock. When the leader dies, nodes must elect a new one quickly and correctly. Raft uses logs and term numbers to ensure only one leader at a time.',
    analogy: '👑 A company needs exactly one CEO. If the CEO leaves, the board elects a new one through a formal process. During the transition, no major decisions are made. Leader election ensures there\'s always exactly one — never zero, never two.'
  },
  'Distributed Locks': {
    explain: 'A <strong>distributed lock</strong> ensures only one process across many servers can do something at a time. Redis SETNX is commonly used: "set this key only if it doesn\'t exist, with TTL." If you get the key, you hold the lock. If not, someone else does. TTL prevents deadlocks if the holder crashes.',
    analogy: '🚽 A single-occupancy restroom with a lock. First person in locks it — nobody else can enter. When they leave (or if they\'re in too long, the lock auto-expires), the next person can get in. TTL = the door auto-unlocks after 30 seconds so it never gets permanently stuck.'
  },
  'Two-Phase Commit': {
    explain: '<strong>2PC</strong> = a protocol to coordinate a transaction across multiple databases. Phase 1 (Prepare): coordinator asks all participants "can you commit?" Each says yes/no. Phase 2 (Commit): if all say yes, coordinator sends commit to all. If any says no, abort all. Guarantees atomicity across DBs but is slow and blocks on failure.',
    analogy: '💍 Planning a surprise party. Phase 1: coordinator calls all guests "can you come Saturday?" Everyone says yes. Phase 2: coordinator confirms "OK, everyone come Saturday." If one person says no, the whole event is cancelled to maintain the surprise. Safe but requires everyone to wait for all confirmations.'
  },
  'Vector Clocks': {
    explain: '<strong>Vector clocks</strong> track causality across distributed nodes. Each node maintains a counter per node. When events happen or messages are sent, clocks are incremented and merged. This lets you determine if event A happened before B, B before A, or if they\'re concurrent (conflict).',
    analogy: '📅 Imagine two people editing a Google Doc offline. When they sync, who edited first? Vector clocks track the "happened-before" relationship — like timestamps but reliable across different machines with potentially different clocks.'
  },
  'Idempotency': {
    explain: 'An <strong>idempotent</strong> operation can be applied multiple times without changing the result beyond the first application. Crucial for safe retries. Setting a value to 5 is idempotent (do it 10 times = still 5). Adding 5 to a value is NOT idempotent (do it 10 times = +50).',
    analogy: '🔘 Pressing the elevator "close door" button. Press it 10 times — the door closes once. That\'s idempotent. Compare to pressing "floor 5" — each press doesn\'t add another trip. But pressing "add item to cart" twice adds two items — not idempotent.'
  },
  // Message Queues
  'Producer-Consumer': {
    explain: '<strong>Producer</strong> creates messages and puts them in the queue. <strong>Consumer</strong> reads messages from the queue and processes them. They operate independently — producers don\'t wait for consumers. This decoupling means either side can fail, slow down, or scale independently without affecting the other.',
    analogy: '🏭 A factory assembly line. Workers (producers) add parts to a conveyor belt. Workers at the other end (consumers) take parts off and assemble them. The belt buffers production — if assembly slows, the belt fills up but production continues.'
  },
  'Pub/Sub': {
    explain: '<strong>Publish/Subscribe</strong> = a message pattern where publishers send to topics, not directly to subscribers. Any number of subscribers can listen to a topic independently. Publishers don\'t know who\'s listening. One event → many consumers react. Kafka, Google Pub/Sub, AWS SNS implement this.',
    analogy: '📻 A radio broadcast. The radio station (publisher) sends one signal. Thousands of radios (subscribers) tune in independently. The station doesn\'t know who\'s listening or how many. Adding a new listener requires zero changes to the station.'
  },
  'Message Ordering': {
    explain: 'Message queues don\'t always guarantee order across partitions. Within a Kafka partition, messages are strictly ordered (FIFO). Across partitions, ordering is lost. If order matters (e.g., "debit then credit" must happen in sequence), send related messages to the same partition using a consistent key.',
    analogy: '📬 Letters in a single mailbox arrive in order. But if you have 5 mailboxes (partitions) and letters go to different boxes randomly, the overall sequence is lost. To maintain order, keep related letters in the same box.'
  },
  'Backpressure': {
    explain: '<strong>Backpressure</strong> = a mechanism for consumers to signal producers to slow down when they can\'t keep up. Without backpressure, a fast producer fills the queue indefinitely until it runs out of memory and crashes. With backpressure, the queue applies resistance upstream: "slow down, I\'m full."',
    analogy: '🚿 A drainpipe clogged: if you keep pouring water at full speed, it overflows. Backpressure is the water rising in the sink — naturally slowing you down. Reactive Streams formalized this for software.'
  },
  'Kafka': {
    explain: '<strong>Apache Kafka</strong> = distributed event streaming platform. Topics are split into partitions stored across brokers. Messages are persisted to disk (durable). Consumers track their own offset (position) so they can replay messages. High throughput (millions of messages/sec). Used by LinkedIn, Uber, Netflix.',
    analogy: '📰 A newspaper printing millions of copies and archiving every edition. Subscribers (consumers) read at their own pace and can request back-issues (replay). The newspaper doesn\'t care how many subscribers there are or if one stops reading for a week.'
  },
  'RabbitMQ': {
    explain: '<strong>RabbitMQ</strong> = message broker using AMQP protocol. Supports flexible routing (exchanges, queues, binding keys). Messages are acknowledged — if consumer crashes, message is re-queued. Lower throughput than Kafka but more routing flexibility. Better for task queues where each message needs exactly-once processing.',
    analogy: '📦 A package sorting facility. Each package (message) gets routed to the right delivery truck (queue) based on destination (routing key). If a truck breaks down, packages go back to the facility to be re-routed. Kafka is a firehose; RabbitMQ is a smart router.'
  },
  // LLD
  'Single Responsibility': {
    explain: 'A class should have <strong>one reason to change</strong>. If your UserService handles authentication, profile updates, email sending, AND payment processing — changing email templates requires touching the same class as payment logic. Split into AuthService, ProfileService, EmailService, PaymentService.',
    analogy: '👨‍🍳 A chef who also does accounting, drives the delivery truck, and designs the menu will be terrible at all of them. One person, one job. A class, one responsibility.'
  },
  'Open-Closed': {
    explain: 'Classes should be <strong>open for extension, closed for modification</strong>. Adding new behavior shouldn\'t require editing existing code. Instead of: if (type == "STRIPE") else if (type == "PAYPAL"), define a PaymentProcessor interface and create StripeProcessor, PaypalProcessor classes. Adding Razorpay = new class only.',
    analogy: '🔌 A power strip is open to new devices (extension) but you don\'t rewire the strip each time you add a plug (modification). New devices just plug in using the existing standard interface.'
  },
  'Liskov Substitution': {
    explain: 'A subclass should be <strong>substitutable for its parent class</strong> without breaking behavior. If code works with a Shape, it should work with Circle or Rectangle without special cases. If Square extends Rectangle but overrides setWidth to also change height (breaking contracts), code expecting Rectangle will break.',
    analogy: '🦆 If it walks like a duck and quacks like a duck, it should work wherever a duck is expected. Rubber Duck extends Duck but quacks with a squeak and doesn\'t swim — it violates Liskov because duck-expecting code breaks with it.'
  },
  'Interface Segregation': {
    explain: 'Don\'t force classes to implement methods they don\'t need. A fat IAnimal interface with fly(), swim(), run() forces Dog to implement fly() as a stub. Better: IFlyable, ISwimmable, IRunnable. Dog implements just IRunnable and ISwimmable.',
    analogy: '📝 Don\'t give a receptionist a job description that includes "perform surgery" just because the doctor\'s role description has it. Each role should only include what\'s actually relevant to that role.'
  },
  'Dependency Inversion': {
    explain: 'High-level modules should depend on <strong>abstractions</strong>, not concrete implementations. OrderService should depend on IPaymentGateway interface, not StripeGateway class. This way, you can swap Stripe for PayPal (or mock it in tests) without touching OrderService at all.',
    analogy: '🔦 A flashlight accepts any brand of battery that fits the standard size — it depends on the "battery interface" (size + polarity), not a specific brand. Swap Duracell for Energizer — flashlight works. Depend on the standard, not the brand.'
  },
  // Design Patterns
  'Singleton': {
    explain: 'Ensures <strong>only one instance</strong> of a class exists. Used for: DB connection pool, config manager, logger. Thread-safe implementation requires double-checked locking or the initialization-on-demand holder pattern. Overused — be careful, singletons make testing hard and can hide global state.',
    analogy: '🌍 There\'s only one Earth. No matter how many people look for a planet to live on, they all end up at the same one. A Singleton is the "one Earth" of your codebase — globally accessible, only one instance.'
  },
  'Factory': {
    explain: 'Encapsulates object creation logic. Instead of <code>new StripeProcessor()</code> scattered everywhere, call <code>PaymentFactory.create(userCountry)</code>. The factory decides which concrete class to instantiate. Callers only know the interface. Adding a new payment method = add a new class + update the factory.',
    analogy: '🏭 A car factory takes in an order ("I want a SUV, red, automatic") and returns a car. You don\'t build the car yourself — you specify what you want and the factory handles the construction details.'
  },
  'Strategy': {
    explain: 'Defines a family of algorithms, encapsulates each, and makes them interchangeable. The context class holds a reference to a strategy interface and delegates to it. Swap strategies at runtime without changing the context.',
    analogy: '🗺️ A navigation app using different route strategies: fastest route, shortest distance, avoid highways, most scenic. Same app, different strategy injected. You switch the strategy; the app\'s core logic doesn\'t change.'
  },
  'Observer': {
    explain: 'Subject maintains a list of observers. When state changes, it notifies all of them. This is the in-process version of pub/sub. EventEmitters, React\'s state updates, and DOM event listeners all implement observer.',
    analogy: '📱 You follow someone on Instagram. When they post, you (and all followers) get notified. You didn\'t request the post — you subscribed once and get all future updates automatically. Instagram\'s notification system is an observer pattern at scale.'
  },
  // Interview Strategy
  'Structure': {
    explain: 'The 5-step framework for any system design interview: 1) <strong>Requirements</strong> (clarify what to build), 2) <strong>Capacity estimation</strong> (how big?), 3) <strong>High-level design</strong> (boxes and arrows), 4) <strong>Deep dive</strong> (interesting components), 5) <strong>Trade-offs</strong> (what did you sacrifice?). Always in this order.',
    analogy: '🏗️ Designing a building: first understand what it\'s for (requirements), estimate how many people it needs to hold (capacity), sketch the floor plan (high-level), detail the structural engineering of the critical parts (deep dive), then discuss cost vs safety trade-offs.'
  },
  'Traffic Estimation': {
    explain: 'The formula: <strong>DAU × requests/user/day ÷ 86,400 = avg QPS. × 2-3 for peak.</strong> Memorize: 1 day ≈ 100K seconds. Common sizes: char=1B, int=4B, UUID=16B, image=100KB, video=50MB. State assumptions out loud. Interviewers care about your reasoning, not the exact number.',
    analogy: '📊 Like estimating how many pizza slices to order for a party: (guests × slices/person). You\'ll be off by some amount, but 10 guests × 3 slices = 30 slices is far better than guessing. Same principle for QPS estimation.'
  },
  'Bottleneck ID': {
    explain: 'Find the <strong>slowest link</strong> in your chain. App servers scale easily (stateless). Databases don\'t (stateful). Given your QPS estimate: PostgreSQL handles ~2K writes/sec. If you need 10K writes/sec, that\'s your bottleneck — needs sharding. Redis handles 100K ops/sec — rarely the bottleneck.',
    analogy: '🏃 In a relay race, the team\'s speed is limited by the slowest runner. Finding the bottleneck = finding the slowest runner. You can train everyone else to be faster, but overall team speed is still capped by them.'
  },
  'Trade-offs': {
    explain: 'Every design choice sacrifices something. Name the trade-off explicitly: "Caching improves read latency but adds staleness risk and complexity." Anchor to requirements: "For banking, I choose CP over AP because returning a wrong balance is worse than refusing a request." End with: "I\'d revisit this given more time."',
    analogy: '⚖️ Every engineering decision is a scale. More cache = faster reads but stale data. More replicas = more availability but higher cost. Your job isn\'t to find a perfect solution — it\'s to clearly articulate which side of each scale you chose and why.'
  },
  'What Interviewers Expect': {
    explain: 'Not perfection — <strong>process</strong>. Do you ask clarifying questions? Can you estimate order of magnitude? Do you identify the one hard problem in the system? Do you handle feedback without getting defensive? Do you know concrete numbers (Redis=100K ops/sec, Postgres=5K reads/sec)? These signal seniority.',
    analogy: '👨‍⚖️ A judge doesn\'t expect lawyers to know every law by heart. They evaluate: does this lawyer ask the right questions, reason clearly, acknowledge weaknesses, and engage thoughtfully with counterarguments? Same for system design interviewers.'
  },
  // Practice Problems
  'URL Shortener': {
    explain: 'Design: generate a 7-char base62 code for each URL, store in key-value DB (DynamoDB/Redis), cache hot URLs in Redis (viral links = millions of reads), use 302 redirect for click tracking. The hard problems: collision-free ID generation at scale and handling 100:1 read/write ratio.',
    analogy: '🔗 Like a URL shortener in real life — bit.ly takes "amazon.com/very/long/product/url?123" and gives you "bit.ly/abc1234". The magic is the 7-character code fitting trillions of possible URLs and the ability to serve millions of redirects per second.'
  },
  'Rate Limiter': {
    explain: 'Use Redis with atomic INCR + TTL for distributed rate limiting. Token bucket algorithm for smooth limiting. Return X-RateLimit-Remaining headers. Place at API Gateway for infrastructure protection, at service level for business rules. Sliding window log (Redis sorted set) gives most accurate limiting.',
    analogy: '🚦 A toll booth that lets 100 cars through per hour. Cars beyond 100 must wait. If you have 50 toll booths (servers), you need a shared counter in Redis — not 50 independent counters that each allow 100 (which would allow 5000 total).'
  },
  'LRU Cache': {
    explain: 'HashMap (O(1) lookup) + Doubly Linked List (O(1) move to head, O(1) evict from tail). On get: find node via map, move to head. On put: if full, evict tail node, remove from map, add new node at head. O(1) all operations. Java: LinkedHashMap with accessOrder=true.',
    analogy: '📺 Your "recently watched" list on Netflix. The show you just watched goes to the top. Shows you haven\'t watched in months fall to the bottom and eventually disappear to make room for new ones. That\'s LRU eviction.'
  },
  'Google Drive': {
    explain: 'Chunk files into 5-10MB blocks, upload via pre-signed S3 URLs (bypasses app servers), dedup identical blocks by content hash. Metadata in PostgreSQL (sharded by user_id). Sync via block-level diff — only upload changed chunks. WebSocket for real-time sync notifications.',
    analogy: '📁 When you update one slide in a 100-slide presentation, Google Drive uploads only that changed slide, not all 100. That\'s delta sync — upload the difference, not the whole file.'
  },
  'Autocomplete': {
    explain: 'Trie data structure: each node = a character, path from root = a prefix, each node stores top-N completions pre-computed. Query = O(prefix length). Scale: load trie into RAM (~1-2GB for 1M queries). Shard by first character. Cache top prefixes in Redis (top 1% prefixes = 90% of traffic). Rebuild hourly via MapReduce.',
    analogy: '🔍 As you type "sys" in Google Search, a pre-built Trie instantly knows the top 10 completions for that prefix — "system design", "system32", "syscall"... — without scanning millions of past searches each time.'
  },
  'Snowflake ID': {
    explain: '64-bit integer = [1 sign bit] + [41-bit timestamp ms] + [10-bit machine ID] + [12-bit sequence]. Generates 4096 unique IDs per machine per millisecond. Sortable by time. No central coordination. Clock skew = refuse to generate until clock catches up. Used by Twitter for tweet IDs.',
    analogy: '🏷️ Like a serial number that encodes: which factory made it (machine ID), when it was made (timestamp), and which one in that millisecond\'s batch (sequence). Globally unique without any central registry — each factory manages its own numbering.'
  }
};

function buildContent() {
  const main = document.getElementById('main-content');
  sections.forEach((s, si) => {
    const div = document.createElement('div');
    div.id = s.id;
    div.className = 'section' + (si === 0 ? ' active' : '');

    // Build interactive topic tags
    let topicsHtml = s.topics.map(t =>
      `<span class="topic-tag" data-topic="${t}" onclick="showTopicExplainer(this, '${s.id}')">${t}</span>`
    ).join('');

    // Concept box
    const cb = conceptBoxes[s.id];
    let conceptHtml = '';
    if (cb) {
      conceptHtml = `<div class="concept-box">
        <div class="concept-box-header">
          <span class="concept-emoji">${cb.emoji}</span>
          <span class="concept-box-title">${cb.title}</span>
        </div>
        <p>${cb.text}</p>
        ${cb.analogy ? `<div class="analogy">${cb.analogy}</div>` : ''}
      </div>`;
    }

    // Build QA blocks with optional extra diagrams
    let qaHtml = s.qa.map((item, qi) => {
      const extraDiagram = (extraDiagrams[s.id] && extraDiagrams[s.id][qi]) ? extraDiagrams[s.id][qi] : '';
      return `
        <div class="qa-block" data-question="${item.q.toLowerCase()}">
          <div class="q-label">Question 0${qi + 1}</div>
          <div class="question">${item.q}</div>
          <div class="answer">
            <button class="answer-toggle" onclick="toggleAnswer(this)">
              <span>Reveal breakdown</span>
              <span class="toggle-icon">+</span>
            </button>
            <div class="answer-body">${item.a}${extraDiagram}</div>
          </div>
        </div>
      `;
    }).join('<div class="divider qa-divider"></div>');

    div.innerHTML = `
      <div class="section-title">${s.num}. ${s.title}</div>
      <div class="section-sub">Master these concepts for top-tier interviews</div>
      ${conceptHtml}
      <div class="topic-filter-hint">💡 Click any tag below to get a plain-English explanation of that topic</div>
      <div class="topics-bar">${topicsHtml}</div>
      <div class="topic-explainer" id="explainer-${s.id}">
        <div class="topic-explainer-header">
          <span class="topic-explainer-name" id="explainer-name-${s.id}"></span>
          <button class="topic-explainer-close" onclick="closeExplainer('${s.id}')">×</button>
        </div>
        <div class="topic-explainer-body" id="explainer-body-${s.id}"></div>
      </div>
      <div class="divider"></div>
      <div class="qa-container" id="qa-${s.id}">
        ${qaHtml}
      </div>
    `;
    main.appendChild(div);
  });
}

function showTopicExplainer(tagEl, sectionId) {
  const topic = tagEl.dataset.topic;
  const isActive = tagEl.classList.contains('active');

  // Deactivate all tags in this section
  document.querySelectorAll(`#${sectionId} .topic-tag`).forEach(t => t.classList.remove('active'));

  const panel = document.getElementById(`explainer-${sectionId}`);
  const nameEl = document.getElementById(`explainer-name-${sectionId}`);
  const bodyEl = document.getElementById(`explainer-body-${sectionId}`);

  if (isActive) {
    panel.classList.remove('visible');
    return;
  }

  const data = topicExplainers[topic];
  if (!data) {
    panel.classList.remove('visible');
    return;
  }

  tagEl.classList.add('active');
  nameEl.textContent = topic;
  bodyEl.innerHTML = `<p>${data.explain}</p>${data.analogy ? `<div class="t-analogy">${data.analogy}</div>` : ''}`;
  panel.classList.add('visible');

  // Smooth scroll to panel
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeExplainer(sectionId) {
  document.getElementById(`explainer-${sectionId}`).classList.remove('visible');
  document.querySelectorAll(`#${sectionId} .topic-tag`).forEach(t => t.classList.remove('active'));
}

function toggleAnswer(btn) {
  const body = btn.nextElementSibling;
  const icon = btn.querySelector('.toggle-icon');
  const isOpen = body.classList.toggle('open');
  
  // Rotate icon
  icon.style.transform = isOpen ? 'rotate(45deg)' : 'rotate(0)';
}

buildSidebar();
buildContent();
</script>
</body>
