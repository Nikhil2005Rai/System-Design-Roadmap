<ul>
<li><strong>Step 1 — DNS lookup</strong>: Browser checks its DNS cache → if miss, asks OS → OS checks <span class="code-tag">/etc/hosts</span> → asks configured DNS resolver (ISP or 8.8.8.8) → resolver queries root nameserver → TLD nameserver (.com) → Google's authoritative nameserver → returns IP address. This entire chain can take 10–200ms on a cold lookup but is usually cached.</li>
<li><strong>Step 2 — TCP handshake (3-way)</strong>: Browser opens a TCP connection to the resolved IP on port 443. SYN → SYN-ACK → ACK. One round-trip time (RTT) of latency. Connection is now established.</li>
<li><strong>Step 3 — TLS handshake</strong>: Client hello (supported cipher suites, TLS version, random nonce) → Server hello (chosen cipher, certificate) → Client verifies certificate against trusted CA → Key exchange (ECDHE) → Both derive session keys → "Finished" messages exchanged. TLS 1.3 completes in 1 RTT (vs 2 RTT for TLS 1.2).</li>
<li><strong>Step 4 — HTTP request</strong>: Browser sends <span class="code-tag">GET / HTTP/2 Host: www.google.com</span> with headers (cookies, Accept, etc.) over the encrypted TLS channel.</li>
<li><strong>Step 5 — CDN edge server</strong>: Google's anycast routing sends the request to the nearest CDN edge PoP (Point of Presence). If static assets (CSS, JS) are cached at the edge, they're returned without hitting origin — saving hundreds of ms for global users.</li>
<li><strong>Step 6 — Load balancer</strong>: For dynamic requests (search queries), the CDN forwards to Google's load balancer which applies L7 routing (by path, headers, cookies) to send to the appropriate backend fleet.</li>
<li><strong>Step 7 — Backend service</strong>: The request hits a Google frontend server (GFE), is authenticated, hits the search index, retrieves results, and the response flows back through the chain: backend → LB → CDN → client.</li>
</ul>
`},
{q:'Why do CDNs reduce latency?',a:`
<ul>
<li><strong>Proximity</strong>: CDN PoPs are distributed globally (Cloudflare has 300+ PoPs). A user in Mumbai hits a Mumbai PoP instead of a US-East origin server — reducing RTT from ~200ms to ~5ms</li>
<li><strong>Cache static content at the edge</strong>: images, JS, CSS, and fonts are cached at the PoP. Subsequent users in the same region get content from the PoP with no trip to origin</li>
<li><strong>TCP connection reuse</strong>: CDNs maintain persistent connections to the origin. Clients connect to the nearby edge; the edge reuses a warm, pre-established connection to origin — avoiding repeated TCP+TLS handshakes</li>
<li><strong>Anycast routing</strong>: a single IP address routes to the nearest PoP based on BGP routing — no DNS round-robin latency</li>
<li><strong>HTTP/2 and HTTP/3</strong>: CDNs implement the latest protocols between client and edge, even if the origin only speaks HTTP/1.1</li>
</ul>
`},
{q:'Why is TCP used for HTTP?',a:`
<ul>
<li><strong>Reliability</strong>: HTTP requires every byte to arrive in order and without corruption. TCP provides sequencing, acknowledgment, and retransmission — UDP does not</li>
<li><strong>Web content is stateful</strong>: a web page must arrive complete and in order — missing a CSS file or a JS packet renders the page broken</li>
<li><strong>Flow control</strong>: TCP's congestion control (CUBIC, BBR) ensures senders don't overwhelm receivers or network links</li>
<li><strong>Exception — HTTP/3</strong>: HTTP/3 uses QUIC (UDP-based) which implements its own reliability, congestion control, and multiplexing without TCP's head-of-line blocking. This is the modern evolution — but it's still reliable delivery, just implemented in user-space over UDP</li>
</ul>
`}
]},

{id:'s7',num:'07',title:'Protocols',short:'Protocols',
topics:['REST','HTTP','WebSockets','gRPC'],
qa:[
{q:'When should we use WebSockets instead of HTTP?',a:`
<ul>
<li><strong>Real-time, bidirectional communication</strong>: when the server needs to push data to clients without the client requesting it first — e.g., live notifications, chat messages, collaborative editing</li>
<li><strong>Low latency, frequent updates</strong>: live stock prices, gaming state updates, live sports scores — polling HTTP every second is wasteful; WebSocket pushes updates the moment they happen</li>
<li><strong>Persistent connection required</strong>: multiplayer games where server and client continuously exchange state — a persistent WebSocket connection avoids TCP handshake overhead per message</li>
<li><strong>Do NOT use WebSockets when</strong>:
  <ul class="nested">
    <li>Communication is one-directional (client → server only): HTTP POST works fine</li>
    <li>Updates are infrequent (every few minutes): Server-Sent Events (SSE) are lighter weight</li>
    <li>You need request-response semantics with caching: HTTP is purpose-built for this</li>
  </ul>
</li>
<li><strong>Infrastructure consideration</strong>: WebSockets require persistent connections — your load balancer must support L7 WebSocket proxying; connection count limits become a resource concern at scale</li>
</ul>
`},
{q:'Why is gRPC faster than REST?',a:`
<ul>
<li><strong>Binary serialization (Protocol Buffers)</strong>: REST typically uses JSON (text-based, verbose). gRPC uses protobuf which is compact binary — typically 3–10x smaller payload, faster to serialize/deserialize</li>
<li><strong>HTTP/2 multiplexing</strong>: gRPC runs over HTTP/2 which allows multiple requests on one connection (multiplexed streams) without head-of-line blocking. REST over HTTP/1.1 requires multiple TCP connections.</li>
<li><strong>Streaming support</strong>: gRPC natively supports client streaming, server streaming, and bidirectional streaming — REST requires WebSockets or SSE for streaming</li>
<li><strong>Connection reuse</strong>: persistent HTTP/2 connections mean no TCP+TLS handshake per request — significant latency savings in microservice-to-microservice calls</li>
<li><strong>Generated type-safe clients</strong>: protobuf generates strongly-typed client libraries — reduces serialization bugs and eliminates manual HTTP client code</li>
<li><strong>When gRPC is NOT better</strong>: browser clients (limited gRPC-Web support), public APIs (REST is universally understood), simple CRUD where JSON tooling is more productive</li>
</ul>
`},
{q:'Why is HTTP stateless?',a:`
<ul>
<li><strong>Design philosophy</strong>: HTTP was designed for the web where servers can't maintain open connections to millions of browsers. Each request is self-contained — the server needs no memory of previous requests</li>
<li><strong>Scalability benefit</strong>: statelessness means any server in a pool can handle any request — enables horizontal scaling without session affinity</li>
<li><strong>Simplicity</strong>: the server doesn't need to allocate memory per client or manage connection timeouts — reduces server complexity enormously</li>
<li><strong>How state is achieved</strong>: cookies, JWT tokens, and session IDs in headers allow applications to layer state on top of stateless HTTP. The server looks up state from an external store (Redis) using the session ID.</li>
<li><strong>HTTP vs WebSocket</strong>: HTTP is stateless by design; WebSocket is stateful — the connection persists and the server tracks per-connection state. This is why WebSocket adds complexity to scaling.</li>
</ul>
`}
]},

{id:'s8',num:'08',title:'Reliability',short:'Reliability',
topics:['Rate Limiting','Token Bucket','Retries','Exponential Backoff','Circuit Breaker','Health Checks','Heartbeats'],
qa:[
{q:'Why do retries cause cascading failures?',a:`
<ul>
<li><strong>The scenario</strong>: Service A calls Service B. B is slow (95th percentile = 5s instead of 50ms) due to partial overload. A's timeout fires, so A retries. Now A is sending 2x the requests to an already-overloaded B.</li>
<li><strong>Retry amplification</strong>: if you have 100 clients all retrying 3 times, an overloaded service that was receiving 100 RPS suddenly sees 300 RPS — the exact opposite of what helps recovery</li>
<li><strong>Cascading upstream</strong>: A is blocked waiting for B; A's callers time out; A's callers retry — the thundering herd propagates upstream through the entire call chain</li>
<li><strong>Queue buildup</strong>: if B has a request queue, retries fill the queue faster than they drain — queue depth grows unbounded, latency explodes, eventually OOM</li>
<li><strong>Solutions</strong>:
  <ul class="nested">
    <li>Exponential backoff with jitter: don't retry immediately; wait 2^n seconds + random jitter</li>
    <li>Retry budget: limit total retries to 10% of requests to prevent amplification</li>
    <li>Circuit breaker: stop retrying entirely when failure rate crosses a threshold</li>
    <li>Idempotency: ensure retried requests don't cause duplicate side effects (payments!)</li>
  </ul>
</li>
</ul>
`},
{q:'What problem does the circuit breaker solve?',a:`
<ul>
<li><strong>The problem</strong>: without a circuit breaker, clients hammer a failing downstream service with requests. Every request ties up a thread waiting for a timeout — thread pool exhaustion brings down the calling service too</li>
<li><strong>The pattern</strong>: the circuit breaker tracks failure rate. States:
  <ul class="nested">
    <li><strong>Closed</strong> (normal): requests flow through. Failure counter increments on errors.</li>
    <li><strong>Open</strong> (failing): after N failures in a window, the circuit "opens" — requests fail immediately (fast fail) without touching the downstream service. Caller gets an error immediately instead of waiting for timeout.</li>
    <li><strong>Half-open</strong> (probing): after a cooldown period, a few test requests are let through. If they succeed, circuit closes. If they fail, circuit opens again.</li>
  </ul>
</li>
<li><strong>Benefits</strong>:
  <ul class="nested">
    <li>Fast failure instead of slow timeout — releases threads immediately</li>
    <li>Gives the failing service time to recover without being hammered</li>
    <li>Allows graceful degradation: return cached/default response when circuit is open</li>
  </ul>
</li>
<li><strong>Implementation</strong>: Netflix Hystrix (legacy), Resilience4j (modern), built-in in Istio service mesh</li>
</ul>
`},
{q:'How does rate limiting prevent API abuse?',a:`
<ul>
<li><strong>Protects infrastructure</strong>: without rate limiting, a single rogue client (or DDoS) can consume all server resources — rate limiting enforces fairness and resource quotas</li>
<li><strong>Token bucket algorithm</strong>: each client has a bucket with capacity N tokens. Tokens refill at rate R per second. Each request consumes 1 token. If bucket is empty → request is rejected (429 Too Many Requests).</li>
<li><strong>Sliding window</strong>: track request count in the last 60 seconds using a Redis sorted set — more accurate than fixed windows (no burst at window boundaries)</li>
<li><strong>Where to implement</strong>:
  <ul class="nested">
    <li>API Gateway (best): centralized, applies before any backend load</li>
    <li>Nginx/Load Balancer: limits connections at L4/L7</li>
    <li>Application layer: for user-specific or business-logic rate limits (e.g., 5 password reset attempts/hour)</li>
  </ul>
</li>
<li><strong>Distributed rate limiting</strong>: in a multi-instance setup, each instance can maintain its own counter — use Redis as shared counter with atomic INCR + TTL. Lua scripts ensure atomicity.</li>
<li><strong>Graduated responses</strong>: instead of hard reject, slow down (add delay) slightly below the limit; hard reject at the limit; ban temporarily after sustained abuse</li>
</ul>
`}
]},

{id:'s9',num:'09',title:'Distributed Systems',short:'Distributed Systems',
topics:['Data Partitioning','Hash Partitioning','Range Partitioning','Replication','Failover','Idempotency'],
qa:[
{q:'What happens when a node fails in a distributed system?',a:`
<ul>
<li><strong>Detection</strong>: the cluster detects failure via missed heartbeats or failed health checks. In Cassandra, gossip protocol propagates failure info to all nodes. In Zookeeper, ephemeral nodes disappear when the client disconnects.</li>
<li><strong>Leader election</strong> (if the failed node was a leader/primary): Raft or Paxos consensus algorithm is triggered. Remaining nodes elect a new leader based on which has the most up-to-date log. This typically takes 1–3 seconds.</li>
<li><strong>Data redistribution</strong>: the failed node's data partitions (in consistent hashing systems) are re-served from replicas on other nodes. Read requests are automatically routed to replicas.</li>
<li><strong>Write handling during failure</strong>: in a quorum-based system (Cassandra), writes can still succeed if a quorum of replicas (e.g., 2 of 3) acknowledge. The failed node will receive the missed writes via hinted handoff when it rejoins.</li>
<li><strong>Client retries</strong>: the client or service mesh retries the failed request to a healthy replica. If using exponential backoff with jitter, this avoids thundering herd on recovery.</li>
<li><strong>Reconciliation on recovery</strong>: when the failed node comes back, it uses anti-entropy (Merkle trees) to identify and sync missed writes from replicas.</li>
</ul>
`},
{q:'Why must APIs be idempotent?',a:`
<ul>
<li><strong>Network is unreliable</strong>: a client sends a request, the network drops the response but the server processed it. The client doesn't know — it retries. Without idempotency, the action happens twice.</li>
<li><strong>Critical for financial systems</strong>: charging a customer twice because of a retry is a catastrophic bug. An idempotent payment API must use a unique <span class="code-tag">idempotency_key</span> — the server stores processed keys and returns the same response on duplicate requests.</li>
<li><strong>HTTP semantics</strong>: GET, PUT, DELETE are defined as idempotent (repeating them has the same effect as once). POST is not — calling POST /orders twice creates two orders.</li>
<li><strong>Implementation</strong>:
  <ul class="nested">
    <li>Client generates a unique <span class="code-tag">idempotency_key</span> (UUID) per logical operation</li>
    <li>Server stores <span class="code-tag">(idempotency_key → response)</span> in Redis or DB with TTL</li>
    <li>On duplicate request: return stored response without re-executing business logic</li>
  </ul>
</li>
<li><strong>Idempotency at-scale</strong>: AWS SQS guarantees at-least-once delivery — your message consumer must be idempotent to handle duplicate messages gracefully</li>
</ul>
`},
{q:'What causes hot partitions?',a:`
<ul>
<li><strong>Skewed access patterns</strong>: if you partition by <span class="code-tag">user_id</span>, a user with 100M followers generates disproportionate reads — their partition is "hot"</li>
<li><strong>Poor partition key choice</strong>: using <span class="code-tag">timestamp</span> as partition key means all writes go to the "current" partition — a classic time-series anti-pattern</li>
<li><strong>Small cardinality keys</strong>: partitioning by <span class="code-tag">status</span> (active/inactive) means only 2 partitions — everything is hot</li>
<li><strong>Solutions</strong>:
  <ul class="nested">
    <li>Add salt/suffix to partition key: <span class="code-tag">user_id + "_" + random(0,10)</span> — spreads hot entity across 10 partitions, but requires scatter-gather for reads</li>
    <li>Application-level caching: absorb hot reads in Redis before they hit the partition</li>
    <li>Partition splitting: split a hot partition into smaller sub-partitions</li>
    <li>Write-behind pattern: buffer writes locally, batch-write to the partition periodically</li>
  </ul>
</li>
</ul>
`}
]},

{id:'s10',num:'10',title:'Message Queues',short:'Message Queues',
topics:['Producer-Consumer','Pub/Sub','Message Ordering','Backpressure','Kafka','RabbitMQ'],
qa:[
{q:'Why do we need message queues?',a:`
<ul>
<li><strong>Decoupling</strong>: producers and consumers are independent — a producer doesn't need to know which service consumes its messages, or even if one is running. Services can be deployed and scaled independently.</li>
<li><strong>Absorb traffic spikes</strong>: if 100K orders arrive in 10 seconds but your order service can only process 10K/sec, a queue buffers the excess. Without a queue, your service crashes or drops requests.</li>
<li><strong>Async processing</strong>: move slow, non-critical operations (sending emails, generating thumbnails, analytics) off the critical path. User gets immediate response; work happens asynchronously.</li>
<li><strong>Durability</strong>: messages are persisted to disk (Kafka, RabbitMQ). Even if the consumer crashes, messages are not lost — processed on recovery.</li>
<li><strong>Fan-out</strong>: one message can be consumed by multiple consumers (pub/sub) — e.g., a payment event triggers accounting, notification, and analytics consumers simultaneously</li>
</ul>
`},
{q:'What problems does pub/sub solve?',a:`
<ul>
<li><strong>One-to-many broadcasting</strong>: instead of a producer directly calling N services (tight coupling), it publishes to a topic. Any number of subscribers consume independently — adding a new consumer requires no change to the producer.</li>
<li><strong>Event-driven architecture</strong>: services react to events rather than polling or direct calls — more resilient, more composable</li>
<li><strong>Topic-based filtering</strong>: consumers subscribe to only the topics they care about — not all events, just relevant ones</li>
<li><strong>Replay capability</strong> (Kafka): consumers can replay old messages — useful for rebuilding state after a crash, onboarding new consumers to historical data, or debugging</li>
<li><strong>Observer pattern at scale</strong>: pub/sub is the distributed systems implementation of the observer pattern. The topic is the subject; subscribers are observers.</li>
<li><strong>Problem with pub/sub</strong>: message ordering across partitions is not guaranteed; exactly-once delivery is hard; debugging event chains across services is complex</li>
</ul>
`},
{q:'What causes consumer lag?',a:`
<ul>
<li><strong>Definition</strong>: consumer lag = difference between the latest message offset in the queue and the offset the consumer has processed. High lag means consumers are falling behind producers.</li>
<li><strong>Causes</strong>:
  <ul class="nested">
    <li>Consumer processing is slower than message production rate — not enough consumer instances</li>
    <li>Slow external calls in consumer logic (DB writes, HTTP calls to downstream services)</li>
    <li>Consumer group rebalancing: when a consumer joins or leaves, Kafka reassigns partitions — all consumers pause briefly, causing lag spike</li>
    <li>Large batch sizes: if a consumer processes 1,000 messages per batch but a step fails, the whole batch is retried — appears as lag spikes</li>
    <li>GC pauses in JVM consumers: a 500ms GC pause in a consumer means 500ms of no processing</li>
  </ul>
</li>
<li><strong>Solutions</strong>:
  <ul class="nested">
    <li>Scale up consumers: add more consumer instances (up to the number of partitions)</li>
    <li>Increase partitions: more partitions = higher parallelism (irreversible in Kafka — plan ahead)</li>
    <li>Optimize consumer logic: batch DB writes, use async I/O, reduce processing time per message</li>
    <li>Monitor lag as a metric: alert when lag exceeds a threshold — lag is a leading indicator of problems</li>
  </ul>
</li>
</ul>
`}
]},

{id:'s11',num:'11',title:'LLD Fundamentals',short:'LLD & SOLID',
topics:['Single Responsibility','Open-Closed','Liskov Substitution','Interface Segregation','Dependency Inversion'],
qa:[
{q:'Why does SOLID matter in large systems?',a:`
<ul>
<li><strong>Single Responsibility (SRP)</strong>: each class does one thing → easier to test, change, and understand. A class that handles DB access, business logic, AND email sending is impossible to unit-test and breaks for multiple reasons.</li>
<li><strong>Open-Closed (OCP)</strong>: classes are open for extension, closed for modification. Add new payment methods by extending an interface, not by editing existing PaymentProcessor code — reduces regression risk.</li>
<li><strong>Liskov Substitution (LSP)</strong>: subtypes must be substitutable for base types. If Rectangle has a subclass Square that overrides setWidth/setHeight in a breaking way, polymorphism breaks — code expecting Rectangle fails silently.</li>
<li><strong>Interface Segregation (ISP)</strong>: no class should be forced to implement interfaces it doesn't use. A thin ReadOnlyRepository interface is better than a fat Repository interface that forces read-only implementations to stub out write methods.</li>
<li><strong>Dependency Inversion (DIP)</strong>: high-level modules depend on abstractions, not concretions. An OrderService should depend on <span class="code-tag">IPaymentGateway</span>, not <span class="code-tag">StripeGateway</span> — swap Stripe for PayPal without touching OrderService.</li>
<li><strong>In large systems</strong>: hundreds of engineers working on a codebase simultaneously need these guardrails. SOLID makes the codebase predictable — you can read one class and understand it without knowing the whole system.</li>
</ul>
`},
{q:'What happens when classes violate SRP?',a:`
<ul>
<li><strong>God classes emerge</strong>: a UserService that handles authentication, profile management, email verification, payment processing, and analytics becomes thousands of lines — no one person understands it fully</li>
<li><strong>Test complexity explodes</strong>: to unit test one function, you need to mock 10 unrelated dependencies that live in the same class</li>
<li><strong>Merge conflicts increase</strong>: multiple teams editing the same class for unrelated features causes constant merge conflicts and slows velocity</li>
<li><strong>Cascading changes</strong>: a change to the email sending logic risks breaking authentication because they share state in the same class</li>
<li><strong>Refactoring is risky</strong>: extracting a god class into smaller classes after the fact requires understanding all callers — a multi-week project vs. getting it right initially</li>
</ul>
`}
]},

{id:'s12',num:'12',title:'Design Patterns',short:'Design Patterns',
topics:['Singleton','Factory','Strategy','Observer'],
qa:[
{q:'Singleton — use cases and thread-safe implementation',a:`
<ul>
<li><strong>Use cases</strong>: Logger (one global log writer), Configuration (load config once, read everywhere), DB connection pool (one pool shared across the app), Cache manager</li>
<li><strong>Thread-safe singleton (double-checked locking in Java)</strong>:</li>
</ul>
<pre>public class Singleton {
    private static volatile Singleton instance;
    private Singleton() {}
    
    public static Singleton getInstance() {
        if (instance == null) {
            synchronized (Singleton.class) {
                if (instance == null) {  // double check
                    instance = new Singleton();
                }
            }
        }
        return instance;
    }
}</pre>
<ul>
<li><strong>Why volatile?</strong>: without <span class="code-tag">volatile</span>, the JVM can reorder object initialization — thread B might see a non-null but partially initialized object</li>
<li><strong>Better alternative (Bill Pugh / Initialization-on-demand)</strong>: the inner static class is not loaded until <span class="code-tag">getInstance()</span> is called — thread-safe by class loader guarantee, no synchronization overhead:</li>
</ul>
<pre>public class Singleton {
    private static class Holder {
        static final Singleton INSTANCE = new Singleton();
    }
    public static Singleton getInstance() { return Holder.INSTANCE; }
}</pre>
`},
{q:'When is the Factory Pattern useful?',a:`
<ul>
<li><strong>When object creation is complex</strong>: encapsulate multi-step construction logic in a factory rather than scattering it across callers</li>
<li><strong>When the concrete type is determined at runtime</strong>: <span class="code-tag">NotificationFactory.create("EMAIL")</span> returns an <span class="code-tag">EmailNotification</span>; <span class="code-tag">create("SMS")</span> returns <span class="code-tag">SmsNotification</span> — caller only knows the interface</li>
<li><strong>Decouples creation from usage</strong>: changing from MySQL to PostgreSQL means changing the factory, not every DAO class</li>
<li><strong>Example at scale</strong>: a payment system's <span class="code-tag">PaymentProcessorFactory</span> creates Stripe, PayPal, or Braintree processors based on user country — the OrderService doesn't know which processor it gets</li>
</ul>
`},
{q:'How can algorithms be swapped dynamically with Strategy Pattern?',a:`
<ul>
<li><strong>Define a strategy interface</strong>: <span class="code-tag">interface SortStrategy { void sort(int[] data); }</span></li>
<li><strong>Implement concrete strategies</strong>: <span class="code-tag">QuickSort</span>, <span class="code-tag">MergeSort</span>, <span class="code-tag">RadixSort</span> each implement the interface</li>
<li><strong>Context class holds a reference</strong>: <span class="code-tag">DataProcessor</span> has a <span class="code-tag">SortStrategy strategy</span> field — calling <span class="code-tag">process()</span> delegates to <span class="code-tag">strategy.sort()</span></li>
<li><strong>Runtime swap</strong>: <span class="code-tag">processor.setStrategy(new QuickSort())</span> — algorithm changes without modifying DataProcessor</li>
<li><strong>Real-world examples</strong>:
  <ul class="nested">
    <li>Compression: GZIP vs LZ4 vs Snappy based on data type and latency requirements</li>
    <li>Authentication: JWT strategy vs Session strategy, swappable per environment</li>
    <li>Routing: different load balancing strategies (round-robin, least-conn, weighted) injected at startup</li>
  </ul>
</li>
</ul>
`},
{q:'How do pub/sub systems relate to the Observer Pattern?',a:`
<ul>
<li><strong>Observer pattern</strong>: Subject maintains a list of Observers. When subject state changes, it calls <span class="code-tag">notify()</span> on all observers. Direct in-process communication.</li>
<li><strong>Pub/sub is the distributed version</strong>: the "topic" is the subject; "subscribers" are observers; the message broker (Kafka, RabbitMQ) decouples them so they don't need direct references</li>
<li><strong>Key differences</strong>:
  <ul class="nested">
    <li>Observer: subject knows its observers directly (tight coupling)</li>
    <li>Pub/sub: publisher doesn't know subscribers (loose coupling via broker)</li>
    <li>Observer: synchronous (notify() blocks until all observers return)</li>
    <li>Pub/sub: asynchronous (publisher returns immediately after publishing)</li>
    <li>Observer: in-process, no durability</li>
    <li>Pub/sub: cross-process, durable (Kafka persists messages to disk)</li>
  </ul>
</li>
</ul>
`}
]},

{id:'s14',num:'14',title:'Practice Problems',short:'Practice Problems',
topics:['URL Shortener','Rate Limiter','LRU Cache','Google Drive','Autocomplete','Snowflake ID'],
qa:[
{q:'URL Shortener (TinyURL) — full design walkthrough',a:`
<ul>
<li><strong>Short URL generation</strong>: hash the long URL using MD5 or SHA-256 → take first 6–8 characters. Alternatively, generate a random base62 string (a-z, A-Z, 0-9) of length 7 → 62^7 = ~3.5 trillion combinations</li>
<li><strong>Collision prevention</strong>:
  <ul class="nested">
    <li>Check if short code exists in DB before returning it</li>
    <li>If collision, append a counter suffix or regenerate</li>
    <li>Better: use a distributed ID generator (like Snowflake) and base62-encode the ID — guaranteed unique by construction</li>
  </ul>
</li>
<li><strong>Storage</strong>: simple key-value: <span class="code-tag">short_code → long_url</span>. DynamoDB or Redis are ideal — O(1) lookup, no complex queries needed</li>
<li><strong>Scaling reads</strong>:
  <ul class="nested">
    <li>Cache hot short codes in Redis — a viral link might be accessed millions of times/day</li>
    <li>Read replicas in the database for high read traffic</li>
    <li>CDN at the redirect endpoint — edge servers handle the 301 redirect for cached URLs</li>
  </ul>
</li>
<li><strong>Redirect type</strong>: 301 (permanent, browser caches → reduces server load) vs 302 (temporary, server handles every request → better for analytics). Use 302 if you need click tracking.</li>
<li><strong>Scale estimate</strong>: 100M new URLs/day = ~1200 writes/sec. 10B redirects/day = ~115K reads/sec. 1,000:1 read:write ratio → optimize heavily for reads.</li>
</ul>
`},
{q:'Rate Limiter — gateway vs service, and distributed implementation',a:`
<ul>
<li><strong>Where should it live?</strong>:
  <ul class="nested">
    <li><strong>API Gateway</strong> (recommended): rate limiting happens before requests reach any service — protects the entire backend. Centralized, easy to manage, applies to all endpoints uniformly.</li>
    <li><strong>Individual service</strong>: for business-logic rate limits (e.g., "max 5 failed login attempts per user per hour") — the service has the context to enforce this rule</li>
    <li>Use both: gateway for infrastructure protection (DDoS), service-level for business rules</li>
  </ul>
</li>
<li><strong>Distributed rate limiting with Redis</strong>:
  <ul class="nested">
    <li>Each API instance shares a Redis counter. Atomic INCR + TTL ensures correctness across instances.</li>
    <li>Lua script for atomicity: <span class="code-tag">INCR key → if count == 1, EXPIRE key 60 → return count</span></li>
    <li>Sliding window: use Redis sorted set with timestamps as scores — count elements in last 60 seconds. More accurate than fixed window.</li>
  </ul>
</li>
<li><strong>Token bucket in Redis</strong>: store <span class="code-tag">(tokens, last_refill_timestamp)</span> per key. On each request, compute tokens earned since last request, add to bucket (cap at max), deduct 1 token if available.</li>
<li><strong>Response headers</strong>: always return <span class="code-tag">X-RateLimit-Limit</span>, <span class="code-tag">X-RateLimit-Remaining</span>, <span class="code-tag">Retry-After</span> — clients can back off intelligently</li>
</ul>
`},
{q:'LRU Cache — why HashMap + doubly linked list?',a:`
<ul>
<li><strong>Requirements</strong>: O(1) get, O(1) put, evict least-recently-used item when capacity is reached</li>
<li><strong>HashMap alone</strong>: O(1) get/put but no ordering — can't find the LRU item without O(n) scan</li>
<li><strong>Linked list alone</strong>: O(1) insertion/deletion at head/tail but O(n) lookup by key</li>
<li><strong>Combined</strong>:
  <ul class="nested">
    <li>HashMap: <span class="code-tag">key → node pointer</span> — O(1) access to any node</li>
    <li>Doubly linked list: nodes ordered by recency (most recent at head, LRU at tail) — O(1) move-to-head and O(1) remove-from-tail</li>
    <li>On get: find node in O(1) via HashMap, move it to head of list in O(1)</li>
    <li>On put (cache full): evict tail node in O(1), remove from HashMap in O(1), insert new node at head</li>
  </ul>
</li>
<li><strong>Why doubly linked?</strong>: to remove a node from the middle of the list in O(1), you need access to both prev and next pointers. Singly linked would require O(n) traversal to find the predecessor.</li>
<li><strong>Java built-in</strong>: <span class="code-tag">LinkedHashMap</span> with <span class="code-tag">accessOrder=true</span> and overridden <span class="code-tag">removeEldestEntry()</span> is a ready-made LRU cache</li>
</ul>
`},
{q:'Google Drive — uploads, metadata, sync',a:`
<ul>
<li><strong>File upload</strong>:
  <ul class="nested">
    <li>Client chunks file into 5–10MB blocks and uploads each chunk separately (resumable uploads)</li>
    <li>Each chunk has a content hash — server deduplicates identical chunks across users (block-level dedup)</li>
    <li>Chunks go directly to object storage (S3/GCS) via a pre-signed URL — bypasses app servers for large files</li>
    <li>Metadata DB records: <span class="code-tag">file_id, owner_id, name, size, chunk_ids[], version, updated_at</span></li>
  </ul>
</li>
<li><strong>Metadata storage</strong>: relational DB (PostgreSQL) for file hierarchy, permissions, sharing — needs ACID and complex queries. Object storage (S3) for actual file bytes.</li>
<li><strong>File synchronization</strong>:
  <ul class="nested">
    <li>Client maintains a local index of file checksums</li>
    <li>On file change: compute diff at block level → upload only changed blocks (delta sync)</li>
    <li>Server sends sync events via WebSocket or long-polling → client downloads changed blocks</li>
    <li>Conflict resolution: last-write-wins by timestamp, or create a "conflicted copy" for simultaneous edits</li>
  </ul>
</li>
<li><strong>Scale</strong>: Google Drive serves billions of files. Metadata DB is sharded by <span class="code-tag">user_id</span>; object storage is distributed across multiple regions for durability (typically 3+ AZ replication).</li>
</ul>
`},
{q:'Autocomplete — Trie and scale',a:`
<ul>
<li><strong>How Trie works</strong>: tree where each node is a character. Path from root to a node spells a prefix. Each node stores: character, children map, isEndOfWord, and top-N most popular completions.</li>
<li><strong>Query</strong>: traverse the trie following the typed prefix (O(L) where L = prefix length) → return the pre-computed list of top suggestions at that node. O(1) after traversal because suggestions are cached at nodes.</li>
<li><strong>Ranking</strong>: each suggestion has a frequency score (based on historical search frequency). Stored as a max-heap or sorted list at each node. Updated periodically via offline batch jobs (daily/hourly aggregation of search logs).</li>
<li><strong>Scaling autocomplete</strong>:
  <ul class="nested">
    <li>Trie is read-heavy — load it entirely into memory. A compact trie for 1M common queries fits in ~1-2GB RAM.</li>
    <li>Shard by first character: 'a*' goes to one server, 'b*' to another — simple and effective</li>
    <li>Cache top queries in Redis: the top 1% of prefixes account for 90% of traffic — cache their responses</li>
    <li>Update frequency: don't rebuild trie on every search. Batch-update every hour using MapReduce over search logs.</li>
  </ul>
</li>
</ul>
`},
{q:'Unique ID Generator (Snowflake) — why auto-increment fails and how distributed IDs work',a:`
<ul>
<li><strong>Why auto-increment fails at scale</strong>:
  <ul class="nested">
    <li>Single point of failure: one DB generates all IDs — it becomes a bottleneck and SPOF</li>
    <li>Sharding conflict: if you shard data across DBs, each shard's auto-increment overlaps (both generate ID=1, ID=2...)</li>
    <li>Predictable IDs: sequential IDs expose business metrics (competitors can estimate your order volume by comparing consecutive order IDs) and enable enumeration attacks</li>
  </ul>
</li>
<li><strong>Snowflake ID structure (64-bit integer)</strong>:
  <ul class="nested">
    <li>Bit 0: sign bit (always 0 → positive number)</li>
    <li>Bits 1–41: timestamp in milliseconds since epoch (~69 year range)</li>
    <li>Bits 42–51: machine/datacenter ID (10 bits → 1024 machines)</li>
    <li>Bits 52–63: sequence number (12 bits → 4096 IDs per machine per millisecond)</li>
  </ul>
</li>
<li><strong>Properties</strong>: globally unique (machine ID differentiates), time-sortable (higher ID = later timestamp), generated locally (no central coordination needed → no SPOF), high throughput (4M IDs/sec per machine)</li>
<li><strong>Clock skew problem</strong>: if a machine's clock goes backward (NTP adjustment), the same timestamp+sequence could repeat → ID collision. Solution: refuse to generate IDs until the clock catches up (wait or raise an alert).</li>
<li><strong>Alternatives</strong>: UUID v4 (128-bit random, not sortable, larger storage), ULID (sortable UUID alternative), MongoDB ObjectID (similar to Snowflake)</li>
</ul>
`}
]},

{id:'s15',num:'15',title:'Interview Strategy',short:'Interview Strategy',
topics:['Structure','Traffic Estimation','Bottleneck ID','Trade-offs','What Interviewers Expect'],
qa:[
{q:'How to structure system design answers',a:`
<ul>
<li><strong>Step 1 — Requirements (3–5 min)</strong>: ask clarifying questions first. Functional requirements (what does the system do?), non-functional requirements (scale, latency, availability, consistency). Don't start designing until you know what you're building.</li>
<li><strong>Step 2 — Capacity estimation (2–3 min)</strong>: QPS, storage, bandwidth. Round aggressively. State your assumptions clearly. This guides design decisions.</li>
<li><strong>Step 3 — High-level design (5–10 min)</strong>: draw the main components — client, LB, app servers, cache, database, CDN. Show the happy path request flow. Get the interviewer to agree before diving deeper.</li>
<li><strong>Step 4 — Deep dive (10–15 min)</strong>: pick the most interesting/critical components and go deep. Don't try to cover everything — go deep on 2–3 areas. Interviewers want to see depth, not breadth.</li>
<li><strong>Step 5 — Trade-offs and bottlenecks (5 min)</strong>: explicitly discuss what your design trades off. Acknowledge what you'd do differently with more time. Show you can think critically about your own design.</li>
<li><strong>Common mistake</strong>: jumping straight into drawing without clarifying requirements. The interviewer may redirect you — starting with requirements shows maturity.</li>
</ul>
`},
{q:'How to estimate traffic quickly in an interview',a:`
<ul>
<li><strong>The formula</strong>: DAU × requests/user/day / 86,400 = average QPS. Multiply by 2-3x for peak.</li>
<li><strong>Useful numbers to memorize</strong>:
  <ul class="nested">
    <li>1 day = 86,400 seconds ≈ 100K seconds (easy rounding)</li>
    <li>1 month = ~2.5M seconds</li>
    <li>1 year = ~30M seconds</li>
    <li>Twitter-scale: ~300M DAU, ~500M tweets/day</li>
    <li>YouTube-scale: ~2B users, 500 hours of video uploaded/minute</li>
  </ul>
</li>
<li><strong>Storage estimates</strong>: know common data sizes: char = 1B, integer = 4B, UUID = 16B, small image = 100KB, HD image = 1MB, 1-min video = 50MB</li>
<li><strong>Bandwidth</strong>: if 1M QPS each returning 10KB → 10 GB/sec → 10 Tbps. Most CDN providers handle ~100 Tbps total. Sanity-check your numbers.</li>
<li><strong>State your assumptions</strong>: "I'll assume 100M DAU, 10 requests per user per day, 10:1 read-write ratio. Does that seem reasonable?" — shows collaborative thinking</li>
</ul>
`},
{q:'How to identify bottlenecks during an interview',a:`
<ul>
<li><strong>Always ask: where is state?</strong> Stateful components (databases, caches) are almost always the bottleneck. Stateless app servers scale trivially.</li>
<li><strong>Calculate throughput at each layer</strong>: given your QPS estimate, can each component handle it? "We have 10K QPS writes — a single PostgreSQL handles ~2K writes/sec — we need to shard."</li>
<li><strong>Watch for synchronous blocking</strong>: any synchronous call that can be slow (DB query, external API) is a potential bottleneck under load</li>
<li><strong>Check for SPOFs</strong>: anything with no replica or failover is a bottleneck in the availability sense</li>
<li><strong>Common bottlenecks by component</strong>:
  <ul class="nested">
    <li>Database: shard, add replicas, add caching layer</li>
    <li>Cache: increase memory, consistent hashing for distribution</li>
    <li>App servers: stateless + horizontal scale (trivial)</li>
    <li>Message queue: increase partitions, add consumers</li>
    <li>Network: CDN, compression, binary protocols (gRPC)</li>
  </ul>
</li>
</ul>
`},
{q:'How to explain trade-offs clearly',a:`
<ul>
<li><strong>Always frame as a spectrum</strong>: "We can have stronger consistency but higher latency, OR eventual consistency with lower latency — for this use case I'd choose [X] because [Y]"</li>
<li><strong>Name the trade-off explicitly</strong>: CAP theorem forces CP vs AP, not "better" vs "worse". Interviewers want to hear you name the trade-off.</li>
<li><strong>Anchor to requirements</strong>: "Given our consistency requirement is strong (banking), I'd choose CP even though it means some requests fail during partition — that's acceptable because returning wrong balance is worse."</li>
<li><strong>Common trade-offs to discuss</strong>:
  <ul class="nested">
    <li>Consistency vs availability (CAP)</li>
    <li>Latency vs consistency (synchronous vs async replication)</li>
    <li>Cost vs redundancy (3x replication = 3x storage cost)</li>
    <li>Complexity vs performance (caching adds complexity but improves performance)</li>
    <li>Throughput vs latency (batching increases throughput, increases individual latency)</li>
  </ul>
</li>
<li><strong>End with humility</strong>: "This design has X trade-off which I'm not fully happy with — in a real system I'd explore Y alternative but it adds complexity..."</li>
</ul>
`},
{q:'What do interviewers expect from SWE interns?',a:`
<ul>
<li><strong>Not perfection — process</strong>: interviewers don't expect you to design Bigtable from scratch. They want to see how you think, structure problems, and handle feedback.</li>
<li><strong>Requirements first</strong>: showing you ask clarifying questions before jumping to solutions is a strong positive signal — it's what senior engineers do</li>
<li><strong>Rough capacity math</strong>: you don't need exact numbers. Showing you can estimate order of magnitude (10K QPS vs 10M QPS) and that scale drives design decisions is impressive for an intern</li>
<li><strong>Identify the core hard problem</strong>: every system design has 1–2 genuinely hard problems. For URL shortener it's collision-free ID generation and scaling reads. For chat, it's real-time delivery and message ordering. Identifying the hard part shows depth.</li>
<li><strong>Collaborative, not defensive</strong>: when the interviewer suggests an alternative, engage thoughtfully — "That's interesting, the advantage of your approach is X, the trade-off would be Y." Don't defend your design dogmatically.</li>
<li><strong>Knowledge anchors</strong>: knowing concrete numbers (Redis = 100K ops/sec, PostgreSQL = 5K reads/sec, base64 7 chars = 62^7 IDs) makes your design feel grounded rather than theoretical</li>
<li><strong>Draw as you talk</strong>: a whiteboard diagram with boxes and arrows helps the interviewer follow your reasoning and reference components by name during discussion</li>
</ul>
`}
]}
];

function buildSidebar() {
  const container = document.querySelector('.sidebar-sections');
  container.innerHTML = '';
  sections.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'nav-item' + (i === 0 ? ' active' : '');
    item.dataset.id = s.id;
    item.innerHTML = `<span class="nav-num">${s.num}</span> <span class="nav-text">${s.short}</span>`;
    item.onclick = () => showSection(s.id);
    container.appendChild(item);
  });
}

function showSection(id) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  document.querySelectorAll('.section').forEach(el => {
    el.classList.toggle('active', el.id === id);
  });
  
  // Scroll to top of content area when switching sections
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
