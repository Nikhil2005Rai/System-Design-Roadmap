<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Mastery</title>
<style>
/* --- PREMIUM THEME VARIABLES --- */
:root {
  /* Typography */
  --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  
  /* Deep Dark Aesthetic */
  --bg-base: #09090b;
  --bg-surface: #121214;
  --bg-card: rgba(255, 255, 255, 0.02);
  --bg-card-hover: rgba(255, 255, 255, 0.04);
  
  /* Text */
  --text-primary: #f4f4f5;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  
  /* Accents & Borders */
  --accent-primary: #8b5cf6;
  --accent-secondary: #ec4899;
  --accent-glow: rgba(139, 92, 246, 0.25);
  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-strong: rgba(255, 255, 255, 0.12);
  --border-focus: rgba(139, 92, 246, 0.5);
}

/* --- BASE STYLES & RESET --- */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background-color: var(--bg-base);
  color: var(--text-primary);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* --- LAYOUT --- */
.app {
  display: flex;
  min-height: 100vh;
}

/* --- SIDEBAR --- */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  z-index: 10;
}

.sidebar-header {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border-subtle);
  background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
}

.brand-title {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(to right, #fff, #a1a1aa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.02em;
}

.brand-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* Buttons in Sidebar */
.action-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s ease;
  cursor: pointer;
}

.btn svg {
  width: 16px;
  height: 16px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  color: #fff;
  border: 1px solid transparent;
  box-shadow: 0 4px 12px var(--accent-glow);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
  filter: brightness(1.1);
}

.btn-secondary {
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid var(--border-strong);
}

.btn-secondary:hover {
  background: var(--bg-card-hover);
  border-color: var(--text-secondary);
}

.sidebar-sections {
  flex: 1;
  overflow-y: auto;
  padding: 16px 12px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  margin-bottom: 4px;
  cursor: pointer;
  border-radius: 8px;
  font-size: 14px;
  color: var(--text-secondary);
  transition: all 0.2s ease;
  border: 1px solid transparent;
}

.nav-item:hover {
  background: var(--bg-card);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--bg-card-hover);
  color: #fff;
  border-color: var(--border-strong);
  box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02);
}

.nav-num {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent-primary);
  background: rgba(139, 92, 246, 0.1);
  padding: 2px 6px;
  border-radius: 4px;
  min-width: 24px;
  text-align: center;
}

/* --- MAIN CONTENT --- */
.content {
  flex: 1;
  padding: 56px 64px;
  max-width: 1000px;
  margin: 0 auto;
}

.section {
  display: none;
  animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.section.active { display: block; }

@keyframes slideUp { 
  from { opacity: 0; transform: translateY(10px); } 
  to { opacity: 1; transform: translateY(0); } 
}

.section-title {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 8px;
  color: #fff;
  letter-spacing: -0.03em;
}

.section-sub {
  font-size: 16px;
  color: var(--text-secondary);
  margin-bottom: 32px;
}

.topics-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 48px;
}

.topic-tag {
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  color: var(--text-secondary);
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 20px;
  font-weight: 500;
  transition: all 0.2s ease;
  cursor: pointer;
  user-select: none;
}

.topic-tag:hover {
  color: var(--text-primary);
  border-color: var(--text-muted);
}

.topic-tag.active {
  background: rgba(139, 92, 246, 0.15);
  border-color: var(--accent-primary);
  color: #c4b5fd;
  box-shadow: 0 0 10px rgba(139, 92, 246, 0.2);
}

.topic-filter-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* --- TOPIC EXPLAINER PANEL --- */
.topic-explainer {
  display: none;
  background: linear-gradient(135deg, rgba(139,92,246,0.08) 0%, rgba(236,72,153,0.04) 100%);
  border: 1px solid rgba(139,92,246,0.25);
  border-radius: 12px;
  padding: 18px 22px;
  margin-bottom: 20px;
  position: relative;
  animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.topic-explainer.visible { display: block; }

.topic-explainer::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: 12px 12px 0 0;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
}

.topic-explainer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.topic-explainer-name {
  font-size: 13px;
  font-weight: 700;
  color: #c4b5fd;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.topic-explainer-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 0 4px;
  transition: color 0.2s;
}
.topic-explainer-close:hover { color: var(--text-primary); }

.topic-explainer-body {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.75;
}

.topic-explainer-body strong { color: var(--text-primary); }

.topic-explainer-body .t-analogy {
  margin-top: 10px;
  padding: 10px 14px;
  background: rgba(0,0,0,0.25);
  border-left: 3px solid var(--accent-primary);
  border-radius: 0 8px 8px 0;
  font-style: italic;
  font-size: 13px;
  color: var(--text-secondary);
}

/* --- CONCEPT BOX (kid-friendly explainer) --- */
.concept-box {
  background: linear-gradient(135deg, rgba(139,92,246,0.07) 0%, rgba(236,72,153,0.05) 100%);
  border: 1px solid rgba(139,92,246,0.2);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}

.concept-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
}

.concept-box-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.concept-emoji {
  font-size: 22px;
  line-height: 1;
}

.concept-box-title {
  font-size: 13px;
  font-weight: 700;
  color: #c4b5fd;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.concept-box p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 10px;
}

.concept-box p:last-child { margin-bottom: 0; }

.concept-box strong { color: var(--text-primary); }

.concept-box .analogy {
  background: rgba(0,0,0,0.25);
  border-left: 3px solid var(--accent-primary);
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  margin-top: 12px;
  font-size: 13px;
  color: var(--text-secondary);
  font-style: italic;
}

/* --- DIAGRAM ENHANCEMENTS --- */
.diagram-wrap svg {
  display: block;
  width: 100%;
}

/* SVG circle support (consistent hash ring etc.) */
svg .c-purple circle { stroke: #8b5cf6; fill: rgba(139, 92, 246, 0.15); }
svg .c-teal circle   { stroke: #14b8a6; fill: rgba(20, 184, 166, 0.15); }
svg .c-coral circle  { stroke: #f43f5e; fill: rgba(244, 63, 94, 0.15); }
svg .c-blue circle   { stroke: #3b82f6; fill: rgba(59, 130, 246, 0.15); }
svg .c-amber circle  { stroke: #f59e0b; fill: rgba(245, 158, 11, 0.15); }
svg .c-green circle  { stroke: #10b981; fill: rgba(16, 185, 129, 0.15); }

/* QA block hidden state */
.qa-block.filtered-out {
  display: none;
}

/* --- Q&A BLOCKS (PREMIUM CARDS) --- */
.qa-block {
  margin-bottom: 24px;
}

.q-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-primary);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: inline-block;
}

.question {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 20px;
  color: #fff;
  line-height: 1.4;
  letter-spacing: -0.01em;
}

.answer {
  background: var(--bg-surface);
  border-radius: 12px;
  border: 1px solid var(--border-subtle);
  overflow: hidden;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
}

.answer:hover {
  border-color: var(--border-strong);
}

.answer:focus-within, .answer:has(.open) {
  border-color: var(--border-focus);
  box-shadow: 0 4px 20px var(--accent-glow);
}

.answer-toggle {
  width: 100%;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 14px;
  font-family: var(--font-sans);
  font-weight: 600;
  text-align: left;
  transition: all 0.2s ease;
}

.answer-toggle:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.02);
}

.toggle-icon {
  font-size: 20px;
  font-weight: 300;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  color: var(--accent-primary);
}

.answer-body {
  padding: 0 24px;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease, padding 0.4s ease;
  color: var(--text-secondary);
}

.answer-body.open {
  max-height: 5000px; /* Arbitrary large number */
  padding: 0 24px 24px 24px;
  opacity: 1;
  border-top: 1px solid var(--border-subtle);
  margin-top: 8px;
  padding-top: 24px;
}

/* --- TYPOGRAPHY DETAILS --- */
ul { padding-left: 20px; margin: 16px 0; }
li { margin-bottom: 12px; }
li strong { color: var(--text-primary); font-weight: 600; }

.nested { margin-top: 12px; border-left: 1px solid var(--border-strong); padding-left: 20px; list-style-type: circle; }
.nested li { color: var(--text-secondary); font-size: 14px; }

.highlight {
  background: rgba(236, 72, 153, 0.1);
  border-left: 3px solid var(--accent-secondary);
  padding: 16px 20px;
  border-radius: 0 8px 8px 0;
  margin: 24px 0;
  font-size: 14px;
  color: #fff;
  font-weight: 500;
}

.code-tag {
  font-family: var(--font-mono);
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid var(--border-strong);
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--accent-primary);
}

pre {
  background: #000 !important;
  border: 1px solid var(--border-strong) !important;
  border-radius: 8px !important;
  padding: 16px !important;
  font-size: 13px !important;
  font-family: var(--font-mono) !important;
  overflow-x: auto;
  margin: 16px 0 !important;
  color: var(--text-primary) !important;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.diagram-wrap {
  margin: 24px 0;
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  overflow: hidden;
  background: rgba(255,255,255,0.02);
}

.diagram-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  padding: 12px 20px;
  border-bottom: 1px solid var(--border-strong);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  background: var(--bg-surface);
}

.divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 48px 0;
}

/* SVG Overrides for Dark Mode */
svg text.th { fill: var(--text-primary) !important; font-weight: 600; font-family: var(--font-sans); }
svg text.ts { fill: var(--text-secondary) !important; font-family: var(--font-sans); }
svg .c-purple rect { stroke: #8b5cf6; fill: rgba(139, 92, 246, 0.1); }
svg .c-blue rect { stroke: #3b82f6; fill: rgba(59, 130, 246, 0.1); }
svg .c-teal rect { stroke: #14b8a6; fill: rgba(20, 184, 166, 0.1); }
svg .c-amber rect { stroke: #f59e0b; fill: rgba(245, 158, 11, 0.1); }
svg .c-coral rect { stroke: #f43f5e; fill: rgba(244, 63, 94, 0.1); }
svg .c-green rect { stroke: #10b981; fill: rgba(16, 185, 129, 0.1); }
svg .c-gray rect { stroke: var(--border-strong); fill: transparent; }

/* Responsive Design */
@media (max-width: 900px) {
  .app { flex-direction: column; }
  .sidebar { 
    width: 100%; 
    height: auto; 
    position: relative; 
    border-right: none; 
    border-bottom: 1px solid var(--border-strong);
  }
  .sidebar-sections {
    display: flex;
    overflow-x: auto;
    padding: 12px 20px;
    gap: 8px;
    white-space: nowrap;
  }
  .nav-item { margin-bottom: 0; flex-shrink: 0; }
  .action-buttons { flex-direction: row; }
  .btn { flex: 1; }
  .content { padding: 32px 20px; }
  .section-title { font-size: 26px; }
  .question { font-size: 18px; }
}
</style>
</head>

const sections = [
{id:'s1',num:'01',title:'Fundamentals',short:'Fundamentals',
topics:['Throughput vs Latency','QPS','Availability','Consistency','Fault Tolerance','Scalability','Stateless vs Stateful'],
qa:[
{q:'How do we estimate system traffic quickly in interviews?',a:`
<ul>
<li><strong>Start with daily active users (DAU)</strong> — ask the interviewer or make a reasonable assumption (e.g., 10M DAU)</li>
<li><strong>Estimate requests per user per day</strong> — e.g., a user opens the app 5 times and does 3 actions each = 15 requests/day</li>
<li><strong>Calculate QPS</strong>: <span class="code-tag">QPS = (DAU × requests/day) / 86,400</span></li>
<li>Example: 10M DAU × 15 req/day = 150M req/day → ~1,750 QPS average</li>
<li><strong>Apply peak multiplier</strong>: real traffic is not uniform — multiply average by 2–3x for peak QPS</li>
<li><strong>Separate read vs write ratio</strong> — most apps are 80:20 or 90:10 read-heavy; design read and write paths differently</li>
<li><strong>Round aggressively</strong> — exact numbers don't matter; order of magnitude is what counts (100 QPS vs 10K QPS vs 100K QPS leads to very different architectures)</li>
</ul>
<div class="highlight">Google-level tip: Always think in powers of 10. 1 QPS = trivial, 1K QPS = moderate, 100K QPS = you need serious distributed infrastructure.</div>
`},
{q:'What metrics define a scalable system?',a:`
<ul>
<li><strong>Throughput</strong>: requests/second the system can sustain under load — a scalable system should maintain throughput as load increases linearly</li>
<li><strong>Latency at percentiles</strong>: p50, p95, p99 — watch p99 especially; tail latency kills user experience. A scalable system's p99 must not degrade as we add more instances</li>
<li><strong>Error rate</strong>: percentage of requests that fail — should remain negligible under scale</li>
<li><strong>Resource utilization</strong>: CPU, memory, network should not spike unexpectedly under load — the system should scale gracefully</li>
<li><strong>Cost per request</strong>: a well-scaled system should have decreasing (or flat) cost per request as it grows due to economies of scale</li>
<li><strong>Elasticity</strong>: how fast can the system scale up and scale down in response to traffic spikes?</li>
<li><strong>Single point of failure (SPOF) count</strong>: ideally zero SPOFs — every component must have redundancy</li>
</ul>
`},
{q:'How do we estimate storage requirements?',a:`
<ul>
<li><strong>Identify entities and their size</strong> — e.g., a tweet: 140 chars text = ~140 bytes, metadata = ~100 bytes, total ~300 bytes/tweet</li>
<li><strong>Estimate writes per day</strong> — e.g., 100M tweets/day × 300 bytes = 30 GB/day</li>
<li><strong>Account for replication</strong>: typically 3x replication = 90 GB/day storage needed</li>
<li><strong>Add media separately</strong>: images, videos dominate — an average image is 100KB, video is 50MB; estimate separately</li>
<li><strong>Project forward</strong>: 5-year storage = daily writes × 365 × 5. For 90 GB/day: ~164 TB over 5 years</li>
<li><strong>Hot vs cold storage</strong>: only last 30 days of data is frequently accessed — recent data lives on fast SSD; older data moves to cold storage (like AWS Glacier) at 10x lower cost</li>
<li><strong>Index overhead</strong>: add 20–30% overhead for database indexes</li>
</ul>
<div class="highlight">Key formula: Storage = entities/day × size_per_entity × replication_factor × retention_period</div>
`},
{q:'How do you decide which component becomes the bottleneck first?',a:`
<ul>
<li><strong>Draw the request path end-to-end</strong>: client → DNS → load balancer → app server → cache → database → response</li>
<li><strong>Identify stateful components</strong>: databases and caches are almost always the first bottleneck — they have I/O constraints that compute doesn't</li>
<li><strong>Measure or estimate throughput at each layer</strong>:
  <ul class="nested">
    <li>A single app server: ~1,000–5,000 QPS (depending on complexity)</li>
    <li>A single database: ~5,000 reads/sec, ~1,000 writes/sec for PostgreSQL</li>
    <li>A cache (Redis): ~100,000 ops/sec</li>
  </ul>
</li>
<li><strong>The slowest layer defines system throughput</strong> — find the component whose capacity is lowest relative to demand</li>
<li><strong>Check for synchronous dependencies</strong>: any synchronous external call (third-party API, slow DB query) blocks the thread and reduces effective throughput dramatically</li>
<li><strong>Watch for hot spots</strong>: even if overall throughput is fine, a single DB shard or a single cache key being hammered becomes the bottleneck</li>
</ul>
`},
{q:'How do you identify single points of failure?',a:`
<ul>
<li><strong>Walk the dependency graph</strong>: for every component in your architecture, ask — if this fails, does the entire system fail?</li>
<li><strong>Common SPOFs to check</strong>:
  <ul class="nested">
    <li>A single load balancer with no failover</li>
    <li>A single database with no replica</li>
    <li>A single DNS provider</li>
    <li>A single data center / availability zone</li>
    <li>A shared authentication service with no replica</li>
  </ul>
</li>
<li><strong>For each SPOF, ask</strong>: what is the cost of eliminating it? Can we add a replica? Use active-active or active-passive failover?</li>
<li><strong>Blast radius analysis</strong>: when component X fails, how many users are affected? Isolate failures to reduce blast radius — don't let one service failure cascade everywhere</li>
<li><strong>Chaos engineering</strong> (Netflix-style): in production systems, randomly kill instances to verify no hidden SPOFs exist in your actual infrastructure</li>
</ul>
`}
]},

{id:'s2',num:'02',title:'Scaling',short:'Scaling',
topics:['Vertical Scaling','Horizontal Scaling','Auto Scaling','Stateless Architecture','Microservices vs Monolith'],
qa:[
{q:'Why do stateless services scale better?',a:`
<ul>
<li><strong>No session affinity needed</strong>: any instance can handle any request — load balancer can freely distribute traffic using round-robin or least-connections</li>
<li><strong>Horizontal scaling is trivial</strong>: add or remove instances without coordination overhead; no state migration required</li>
<li><strong>Failure isolation</strong>: if an instance dies, no user session is lost — the next request goes to a healthy instance seamlessly</li>
<li><strong>Rolling deployments are safe</strong>: you can take down 20% of instances, update them, bring them back — users don't notice because sessions aren't tied to instances</li>
<li><strong>Where does state live?</strong>: externalized to Redis, a database, or a JWT token — state is the client's responsibility or lives in a shared, replicated store</li>
<li><strong>Contrast with stateful</strong>: a stateful app server holding sessions in memory requires sticky sessions — if that server dies, all its sessions die; you can't freely scale out</li>
</ul>
<div class="highlight">Rule of thumb: State belongs in dedicated data stores (Redis, databases), not in application memory.</div>
`},
{q:'What are the limitations of vertical scaling?',a:`
<ul>
<li><strong>Hard hardware ceiling</strong>: there's a physical limit to how powerful a single machine can be — you can't add infinite CPUs or RAM to one server</li>
<li><strong>Exponential cost curve</strong>: doubling CPU/RAM often costs 4–8x more due to enterprise hardware pricing; value per dollar decreases rapidly</li>
<li><strong>Still a SPOF</strong>: a more powerful single machine is still a single machine — one hardware failure brings everything down</li>
<li><strong>Downtime during upgrades</strong>: vertical scaling usually requires stopping the instance, upgrading hardware, restarting — causes planned downtime</li>
<li><strong>Cannot scale beyond a region</strong>: a single machine cannot be geographically distributed — global latency optimization requires horizontal, multi-region deployment</li>
<li><strong>Useful for</strong>: quick fixes to buy time, databases that are hard to shard (scale-up the primary before sharding), and workloads that truly require high single-thread performance</li>
</ul>
`},
{q:'What problems appear when horizontal scaling increases?',a:`
<ul>
<li><strong>Distributed state management</strong>: sessions, caches, and locks that worked on one machine need to be externalized and shared — adds latency and complexity</li>
<li><strong>Data consistency</strong>: multiple instances writing to a shared database creates race conditions; distributed transactions are expensive</li>
<li><strong>Network overhead</strong>: inter-service calls replace in-process calls; serialization/deserialization, DNS lookups, TCP handshakes add latency</li>
<li><strong>Service discovery</strong>: instances come and go dynamically — you need a registry (Consul, Kubernetes) to know which instances are available</li>
<li><strong>Distributed debugging</strong>: a bug spanning 5 services is exponentially harder to trace than a bug in one monolith — requires distributed tracing (Jaeger, Zipkin)</li>
<li><strong>Thundering herd</strong>: when you scale up suddenly after a spike, new instances might all try to warm their caches simultaneously, hammering the database</li>
<li><strong>Operational complexity</strong>: 100 services instead of 1 means 100x more deployment pipelines, monitoring dashboards, alerting rules, and on-call scenarios</li>
</ul>
`},
{q:'When does a monolith become impossible to scale?',a:`
<ul>
<li><strong>When different components need different scaling profiles</strong>: if your video encoding needs 100 CPUs but your user-auth needs 2, a monolith wastes resources scaling them together</li>
<li><strong>When a single team cannot own the whole codebase</strong>: too many engineers in one repo causes merge conflicts, slow CI, and unclear ownership</li>
<li><strong>When deployment frequency is blocked</strong>: one team's incomplete feature blocks all other teams from deploying — monolith forces synchronized releases</li>
<li><strong>When technology choices are constrained</strong>: entire system must use one language and framework; can't use Go for high-throughput services and Python for ML</li>
<li><strong>When a database becomes the bottleneck</strong>: a single monolith database that serves all use cases (OLTP, analytics, search) will inevitably hit limits — microservices allow database-per-service pattern</li>
</ul>
<div class="highlight">Google-level nuance: Start with a well-structured monolith. Extract to microservices only when you have a clear scaling pain point — premature decomposition creates distributed-system complexity without the benefits.</div>
`}
]},

{id:'s3',num:'03',title:'Load Balancing',short:'Load Balancing',
topics:['L4 vs L7','Round Robin','Least Connections','Consistent Hashing','Sticky Sessions','Health Checks'],
qa:[
{q:'How does a load balancer detect a dead server?',a:`
<ul>
<li><strong>Active health checks</strong>: the load balancer periodically sends probe requests (every 5–30 seconds) to each backend — typically an HTTP GET to <span class="code-tag">/health</span> or <span class="code-tag">/ping</span></li>
<li><strong>Success criteria</strong>: the backend must respond with 2xx within a timeout window (e.g., 2 seconds). Failure for N consecutive checks (e.g., 3) marks the server as unhealthy</li>
<li><strong>Passive health checks</strong>: the LB monitors live traffic — if a server returns 5xx errors or connection timeouts above a threshold, it's removed from rotation without needing explicit probes</li>
<li><strong>Recovery</strong>: a server must pass M consecutive health checks (e.g., 2) before being added back to the pool — prevents flapping</li>
<li><strong>Difference from heartbeats</strong>: heartbeats are server-initiated ("I'm alive"); health checks are LB-initiated ("are you alive?") — both can be used together</li>
<li><strong>Graceful drain</strong>: before removing a server (planned shutdown), the LB stops sending new connections but lets in-flight requests complete (connection draining)</li>
</ul>
`},
{q:'Why is consistent hashing important in distributed systems?',a:`
<ul>
<li><strong>The problem it solves</strong>: with naive modular hashing (<span class="code-tag">server = hash(key) % N</span>), adding or removing one server causes <em>most</em> keys to remap to different servers — massive cache invalidation, thundering herd on the database</li>
<li><strong>Consistent hashing limits remapping</strong>: adding one node causes only <span class="code-tag">K/N</span> keys to remap (K = total keys, N = total nodes) instead of most keys</li>
<li><strong>How it works</strong>: servers and keys are placed on a conceptual ring (0–2³²). A key is served by the nearest server clockwise on the ring</li>
<li><strong>Virtual nodes</strong>: each physical server owns multiple positions on the ring to ensure even distribution and reduce hotspots from unequal spacing</li>
<li><strong>Used in</strong>: Cassandra (token ring), DynamoDB, Memcached, CDN edge server selection, distributed caches</li>
</ul>

<div class="diagram-wrap">
<div class="diagram-label">Consistent hash ring — node join/leave impact</div>

{q:'What happens when a node joins or leaves the hash ring?',a:`
<ul>
<li><strong>Node joins</strong>: the new node takes responsibility for keys between itself and its predecessor on the ring. Only those keys (from the predecessor's range) need to be migrated to the new node — all other nodes are unaffected</li>
<li><strong>Node leaves/fails</strong>: the keys that were owned by the failed node shift to the next node clockwise on the ring. Only ~1/N of total keys are affected</li>
<li><strong>Data migration</strong>: in cache scenarios, no data migration is needed — those keys simply miss cache and are repopulated from the database on next request</li>
<li><strong>In databases (Cassandra)</strong>: the system uses replication — data already exists on neighboring nodes, so a node leaving just means one of the replicas becomes primary</li>
<li><strong>Rebalancing</strong>: after a join, the system streams key-value pairs from the old owner to the new node — called "token migration" in Cassandra</li>
</ul>
`},
{q:'Why are sticky sessions usually avoided?',a:`
<ul>
<li><strong>Undermines horizontal scaling</strong>: requests are pinned to specific servers — a server with many active sessions receives disproportionate load, making load balancing ineffective</li>
<li><strong>SPOF per user</strong>: if the server holding your session crashes, your session is gone — user is effectively logged out or loses context</li>
<li><strong>Deployment problems</strong>: you can't drain and restart a server gracefully if 1,000 users have active sessions on it</li>
<li><strong>Auto-scaling complexity</strong>: when scaling down, you must wait for all sessions to expire naturally before terminating an instance — wastes resources</li>
<li><strong>Better alternative</strong>: externalize session state to Redis. Any server can serve any request. Redis is fast enough (sub-millisecond) that the overhead is negligible</li>
<li><strong>When sticky sessions are acceptable</strong>: WebSocket connections (inherently stateful, must stay connected to one server), or short-lived stateful computations where externalizing state is too expensive</li>
</ul>
`}
]},

{id:'s4',num:'04',title:'Caching',short:'Caching',
topics:['Cache-aside','Write-through','Write-back','Write-around','TTL','LRU/LFU','Redis','Memcached','CDN'],
qa:[
{q:'Why is cache invalidation difficult?',a:`
<ul>
<li><strong>The fundamental problem</strong>: "There are only two hard things in CS: cache invalidation and naming things." — Phil Karlton. The difficulty is correctness under concurrency and distribution.</li>
<li><strong>Race condition on write</strong>: thread A writes to DB and is about to update cache; thread B reads stale cache before A updates it; thread B's result is now outdated</li>
<li><strong>Distributed caches</strong>: in a cluster of cache nodes, invalidating a key on one node doesn't immediately propagate to others — a brief window of inconsistency exists</li>
<li><strong>TTL trade-off</strong>: short TTL = more cache misses and DB load; long TTL = stale data shown to users; choosing the right TTL requires deep understanding of data change frequency</li>
<li><strong>Cascade invalidation</strong>: invalidating a user record may require invalidating 50 derived views that depend on it — hard to track all dependencies</li>
<li><strong>Event-driven invalidation</strong> (better approach): when DB is updated, publish an event; cache invalidation happens asynchronously via event subscriber. Still has a brief staleness window.</li>
<li><strong>Google solution</strong>: use cache versioning — instead of invalidating, write a new version key; reads always go to the latest version; old versions expire via TTL</li>
</ul>
`},
{q:'What causes cache stampede and how do large systems avoid it?',a:`
<ul>
<li><strong>What it is</strong>: a popular cache key expires. Multiple requests arrive simultaneously, all see a miss, all query the database concurrently — the database gets a sudden spike and potentially falls over</li>
<li><strong>Why it's dangerous</strong>: if this hot key was handling 10,000 RPS, 10 seconds of misses while it repopulates means 100,000 uncached requests hit the database</li>
</ul>
<ul>
<li><strong>Solution 1 — Mutex/Lock</strong>: first thread to see a miss acquires a distributed lock (Redis SETNX), queries DB, populates cache, releases lock. Other threads wait or serve stale data. Risk: lock contention.</li>
<li><strong>Solution 2 — Probabilistic Early Recomputation</strong>: before the TTL expires, probabilistically decide to refresh early. Higher probability as expiry approaches. Avoids the cliff-edge expiry problem.</li>
<li><strong>Solution 3 — Background refresh</strong>: serve the stale cache value immediately while a background process asynchronously refreshes the cache. User sees stale data for a brief window but DB is not hammered.</li>
<li><strong>Solution 4 — Jitter on TTL</strong>: instead of a fixed TTL of exactly 1 hour, add random jitter: <span class="code-tag">TTL = 3600 + random(0, 600)</span>. This spreads expirations across time so not all keys expire simultaneously.</li>
</ul>
`},
{q:'When should we NOT use caching?',a:`
<ul>
<li><strong>Highly dynamic data</strong>: if data changes every second (stock prices, live scores), caching adds latency and shows stale values — just query the source directly</li>
<li><strong>Strong consistency requirements</strong>: financial transactions, inventory counts, or anything where showing stale data causes real-world harm (user sees "item in stock" but it sold out 1 second ago)</li>
<li><strong>Unique, low-frequency queries</strong>: if every query has a unique predicate (e.g., full-text search with custom filters), cache hit rate will be near zero — caching adds overhead with no benefit</li>
<li><strong>Write-heavy workloads</strong>: if writes >> reads, you spend most time invalidating/updating cache with few reads benefiting — cache provides little value and adds complexity</li>
<li><strong>Cache size constraints</strong>: if the working set is larger than available cache memory, frequent evictions mean poor hit rates — the cache churn negates benefits</li>
<li><strong>Simple, already-fast queries</strong>: an indexed lookup returning one row in 1ms doesn't need caching — the cache lookup itself adds latency for negligible benefit</li>
</ul>
`}
]},

{id:'s5',num:'05',title:'Databases',short:'Databases',
topics:['SQL vs NoSQL','ACID','CAP Theorem','Sharding','Replication','Read Replicas','Indexing','Eventual Consistency'],
qa:[
{q:'When should we choose SQL vs NoSQL?',a:`
<ul>
<li><strong>Choose SQL (PostgreSQL, MySQL) when</strong>:
  <ul class="nested">
    <li>Data has a well-defined, stable schema</li>
    <li>You need ACID transactions (banking, order management)</li>
    <li>You need complex joins across multiple entities</li>
    <li>Reporting and analytics with ad-hoc queries</li>
    <li>Team is familiar with relational model</li>
  </ul>
</li>
<li><strong>Choose NoSQL when</strong>:
  <ul class="nested">
    <li>Schema is highly variable or evolves frequently (document stores like MongoDB)</li>
    <li>Massive scale write throughput required (Cassandra: millions of writes/sec)</li>
    <li>Key-value access patterns with simple lookups (DynamoDB, Redis)</li>
    <li>Graph relationships (social networks: Neo4j)</li>
    <li>Time-series data (InfluxDB, TimescaleDB)</li>
  </ul>
</li>
<li><strong>Google-level nuance</strong>: most large systems use both. PostgreSQL for user accounts and orders; Cassandra for activity feeds; Redis for caching; Elasticsearch for search. The question is always which DB is right for which use case.</li>
</ul>
`},
{q:'What problems appear when sharding data?',a:`
<ul>
<li><strong>Cross-shard queries</strong>: a query joining users from shard 1 with orders from shard 7 requires scatter-gather — query all shards, merge results in application layer. Slow and complex.</li>
<li><strong>Rebalancing</strong>: as data grows unevenly, some shards become overloaded. Moving data between shards while serving live traffic is extremely dangerous and requires careful orchestration</li>
<li><strong>Referential integrity</strong>: foreign keys across shard boundaries cannot be enforced at DB level — must be enforced in application code</li>
<li><strong>Transactions across shards</strong>: two-phase commit (2PC) is needed for distributed transactions — slow, complex, and a potential deadlock source. Most systems avoid cross-shard transactions by design.</li>
<li><strong>Choosing the wrong shard key</strong>: if you shard by <span class="code-tag">user_id</span> but your most common query is <span class="code-tag">WHERE email = ?</span>, every query hits every shard (full scatter). Shard key must align with access patterns.</li>
</ul>
`},
{q:'What causes hot shards?',a:`
<ul>
<li><strong>Non-uniform access distribution</strong>: if you shard by <span class="code-tag">user_id</span> but some users are celebrities (Twitter's @BarackObama), that shard gets disproportionate read traffic</li>
<li><strong>Time-based access patterns</strong>: if you shard by <span class="code-tag">created_at</span>, recent data is always in the "current" shard while historical shards are cold — temporal hot spotting</li>
<li><strong>Popular entities</strong>: a viral video, a trending hashtag, or a hot product — all queries funnel to one shard</li>
<li><strong>Solutions</strong>:
  <ul class="nested">
    <li>Add a random suffix to the shard key for hot entities: <span class="code-tag">user_id_0, user_id_1, ..., user_id_N</span></li>
    <li>Use consistent hashing with virtual nodes so one physical node owns many virtual nodes, distributing load</li>
    <li>Cache hot entities in Redis to absorb read traffic before it hits the DB shard</li>
    <li>Create dedicated "celebrity" or "hot item" shards with higher resources</li>
  </ul>
</li>
</ul>
`},
{q:'What trade-offs does CAP theorem force?',a:`
<ul>
<li><strong>CAP states</strong>: a distributed system can guarantee at most 2 of: Consistency, Availability, Partition tolerance</li>
<li><strong>Partition tolerance is non-negotiable</strong>: network partitions happen in any distributed system — you can't choose to opt out. So the real choice is: during a partition, do you sacrifice Consistency or Availability?</li>
<li><strong>CP systems</strong> (Consistency + Partition tolerance): when a partition occurs, the system refuses to serve requests rather than return stale data. Example: ZooKeeper, HBase. Used for financial systems where stale reads cause real damage.</li>
<li><strong>AP systems</strong> (Availability + Partition tolerance): when a partition occurs, nodes continue serving requests but may return stale data. Example: Cassandra, DynamoDB, CouchDB. Used for shopping carts, user timelines where stale data is acceptable.</li>
<li><strong>CA systems</strong>: only exist as a theoretical construct in non-distributed (single-node) systems. PostgreSQL is CA but only because it's not distributed.</li>
<li><strong>PACELC extension</strong>: even when no partition exists, there's a latency/consistency trade-off. Replication adds latency — synchronous replication = consistency, asynchronous = latency win.</li>
</ul>
<div class="highlight">Google-level answer: CAP is a simplification. Real systems operate on a spectrum — e.g., Spanner achieves "external consistency" using TrueTime (GPS + atomic clocks) to bound clock skew, giving strong consistency with global availability.</div>
`}
]},
